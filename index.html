Sneha has scored 86% in 12&lt;sup&gt;th&lt;/sup&gt; exam and has studied both Biology and Maths as a subject in school. She scored 56% in interview and 64% in admission test.
&lt;p&gt;&lt;span style=&quot;font-weight: 700;&quot;&gt;निर्देश:&lt;/span&gt;&amp;nbsp;निम्नलिखित जानकारी का ध्यानपूर्वक अध्ययन कीजिए और उन पर आधारित प्रश्नों के उत्तर दीजिए:&lt;/p&gt;

&lt;p&gt;IIT के उम्मीदवारों के लिए FIIT-JEE में दाखिले किए जा रहे हैं। पाठ्यक्रम में दाखिला प्राप्त करने के लिए एक उम्मीदवार को निश्चित रूप से निम्न योग्यताओं की संतुष्टि&amp;nbsp;करनी होगी।&lt;/p&gt;

&lt;p&gt;i) 12वीं कक्षा में उम्मीदवार के अंक 85% से कम नहीं होने चाहिए।&lt;/p&gt;

&lt;p&gt;ii) उम्मीदवार ने 12वीं कक्षा में एक विषय के रूप में गणित का अध्ययन किया हो।&lt;/p&gt;

&lt;p&gt;iii) उम्मीदवार ने प्रवेश परीक्षा में कम से कम 65% अंक प्राप्त किए हों।&lt;/p&gt;

&lt;p&gt;iv) उम्मीदवार ने प्रवेश परीक्षा के लिए हुए साक्षात्कार में कम से कम 50% अंक प्राप्त किए हों।&lt;/p&gt;

&lt;p&gt;नीचे दिए गए प्रश्न में एक उम्मीदवार का विवरण दिया गया है। आपको ऊपर दी गईं शर्तों और प्रत्येक प्रश्न में दी गयी जानकारी के आधार पर निम्नलिखित क्रियाविधियों में से एक को चुनना है और उस क्रियाविधि की संख्या को अपने उत्तर के रूप में चिन्हित करना है। आपको प्रत्येक प्रश्न में दी गई जानकारी के अलावा कुछ भी नहीं मानना है।&lt;/p&gt;
स्नेहा ने 12वीं की परीक्षा में 86% अंक प्राप्त किए हैं और स्कूल में एक विषय के रूप में जीव विज्ञान और गणित दोनों की पढ़ाई की है। उसने साक्षात्कार में 56% और प्रवेश परीक्षा में 64% अंक प्राप्त किए हैं।",The candidate will be selected / उम्मीदवार का चयन किया जाएगा।&amp;nbsp;,The candidate will be enrolled in one month development program / उम्मीदवार को एक महीने के विकास कार्यक्रम में दाखिला दिया जाएगा।&amp;nbsp;,The candidate will not be selected / उम्मीदवार का चयन नहीं किया जाएगा।&amp;nbsp;,Data is not sufficient to take any decision / किसी भी निर्णय को लेने के लिए जानकारी पर्याप्त नहीं है।&amp;nbsp;,3,,,,

    <script id="quiz-data" type="application/json">
{
    "quizTitle": "Mock Tests",
    "questions": [],
    "totalTime": 0,
    "positiveMarking": 2.0,
    "negativeMarking": 0.5,
    "appName": "Testbook",
    "youtubeLink": "https://www.youtube.com/",
    "telegramLink": "https://t.me/",
    "instructionStrings": {
        "screenTitle": "Exam Instructions",
        "quizNamePrefix": "Quiz Name:",
        "totalTime": "Time: -- minutes",
        "totalMarks": "Total Marks: --",
        "instructionsHeader": "Please read the following instructions carefully:",
        "instruction1": "The quiz contains 225 questions total.",
        "instruction2": "Each question has 4 options, and only 1 option is correct.",
        "instruction3": "Time will be computed based on test selected.",
        "instruction4": "Negative marking applies: 0.5 marks will be deducted for each incorrect answer.",
        "instruction5": "2 mark(s) will be awarded for each correct answer.",
        "instruction6": "No marks will be deducted for unattempted questions.",
        "instruction7": "Please ensure you complete the quiz before submitting or closing the browser.",
        "defaultLangMessage": "Your exam's default language is: English",
        "defaultLangDisclaimer": "All questions will be displayed in this language. It cannot be changed later.",
        "agreeCheckboxLabel": "I have read and understood all the instructions, and I agree to follow them.",
        "proceedButton": "I am ready to start",
        "backButton": "Go Back"
    },
    "language": "en",
    "timePerQuestion": 2
}
    </script>
    <script>
        // Fix mobile viewport height (address bar issue)
        function setVh() {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', vh + 'px');
        }
        setVh();
        window.addEventListener('resize', setVh);

        document.addEventListener('DOMContentLoaded', () => {
            const S = {
                // State
                appPhase: 'instructions',
                questions: [],
                userAnswers: [],
                currentQuestionIndex: 0,
                timeLeft: 0,
                timerInterval: null,
                isTimerPaused: true,
                autoNext: false,
                isFullScreen: false,
                isSidebarCollapsed: true,
                quizResults: null,
                reviewIndex: 0
            };

            const C = JSON.parse(document.getElementById('quiz-data').textContent);

            // --- CSV PARSER ---
            function parseCSV(text) {
                const rows = [];
                let current = [];
                let field = '';
                let inQuotes = false;

                for (let i = 0; i < text.length; i++) {
                    const ch = text[i];
                    if (inQuotes) {
                        if (ch === '"' && text[i + 1] === '"') {
                            field += '"';
                            i++;
                        } else if (ch === '"') {
                            inQuotes = false;
                        } else {
                            field += ch;
                        }
                    } else {
                        if (ch === '"') {
                            inQuotes = true;
                        } else if (ch === ',') {
                            current.push(field);
                            field = '';
                        } else if (ch === '\n' || (ch === '\r' && text[i + 1] === '\n')) {
                            if (ch === '\r') i++;
                            current.push(field);
                            field = '';
                            if (current.length > 1 || current[0].trim() !== '') rows.push(current);
                            current = [];
                        } else {
                            field += ch;
                        }
                    }
                }
                current.push(field);
                if (current.length > 1 || current[0].trim() !== '') rows.push(current);
                return rows;
            }

            function decodeHTMLEntities(str) {
                const el = document.createElement('textarea');
                el.innerHTML = str;
                return el.value;
            }

            function cleanOptionText(text) {
                let t = text.trim();
                // Decode HTML entities like &amp;nbsp; -> &nbsp; -> space, &amp;#39; -> &#39; -> '
                t = decodeHTMLEntities(decodeHTMLEntities(t));
                // Remove leading number prefix like "1)", "2) ", etc.
                t = t.replace(/^\d+\)\s*/, '');
                // Trim trailing/leading whitespace and non-breaking spaces
                t = t.replace(/[\u00A0]+$/g, '').trim();
                // Sanitize math-tex spans that don't contain real LaTeX
                t = sanitizeMathTex(t);
                return t;
            }

            // Unwrap math-tex spans that contain only simple text (no real LaTeX commands)
            function sanitizeMathTex(html) {
                // Match <span class="math-tex">\( content \)</span>
                return html.replace(/<span\s+class=["']math-tex["']>\s*\\\(\s*(.*?)\s*\\\)\s*<\/span>/gi, function (match, inner) {
                    // If inner has actual LaTeX commands (\sqrt, \frac, ^, _, \text, \times, etc.), keep it
                    if (/\\[a-zA-Z]+|[\^_{}]/.test(inner)) {
                        return match; // Keep for MathJax
                    }
                    // Otherwise it's just plain text wrapped in math-tex unnecessarily
                    return inner.trim();
                });
            }

            function cleanQuestionText(text) {
                let t = text.trim();
                t = decodeHTMLEntities(decodeHTMLEntities(t));
                // Preserve HTML for rendering (tables, math, bold, images)
                // Just collapse excessive whitespace around tags
                t = t.replace(/(\r?\n\s*){3,}/g, '\n\n');

                // Add <br> for plain newlines if there are no HTML block tags
                if (!t.includes('<p') && !t.includes('<br') && !t.includes('<div') && !t.includes('<table') && !t.includes('<ul') && !t.includes('<ol')) {
                    t = t.replace(/\r?\n/g, '<br/>');
                }

                // Sanitize math-tex spans that don't contain real LaTeX
                t = sanitizeMathTex(t);
                return t.trim();
            }

            function parseCorrectAnswer(str) {
                const s = str.trim();
                // Handle plain number like "1", "2", "3", "4"
                if (/^\d+$/.test(s)) return parseInt(s, 10) - 1;
                // Handle "The correct answer is option X"
                const match = s.match(/option\s*(\d+)/i);
                return match ? parseInt(match[1], 10) - 1 : 0;
            }

            // --- MULTI-TEST SUPPORT ---
            function slugify(str) {
                return str.trim().toLowerCase()
                    .replace(/[_\s]+/g, '-')       // underscores/spaces -> hyphens first
                    .replace(/[^a-z0-9-]/g, '')    // then strip everything else
                    .replace(/-+/g, '-')
                    .replace(/^-|-$/g, '');
            }

            function getUrlParams() {
                return new URLSearchParams(window.location.search);
            }

            // Parse all CSV rows (full master CSV with test_id in column A)
            let allCsvRows = [];

            async function loadFullCSV() {
                let text;
                try {
                    const resp = await fetch('Questions.csv');
                    if (resp.ok) text = await resp.text();
                } catch (e) { }
                if (!text) text = document.getElementById('csv-data').textContent;
                const rows = parseCSV(text);
                // Skip header row — valid rows need: test_id(A) + Statement(B) + 4 opts + Answer = 7 cols min
                allCsvRows = rows.slice(1).filter(row => row.length >= 7 && row[0] && row[0].trim() !== '' && row[1] && row[1].trim() !== '');
                return allCsvRows;
            }

            function getAvailableTests(rows) {
                const testMap = new Map();
                rows.forEach(row => {
                    const testId = row[0].trim();
                    if (!testId) return;
                    if (!testMap.has(testId)) testMap.set(testId, 0);
                    testMap.set(testId, testMap.get(testId) + 1);
                });
                return testMap; // Map<testName, questionCount>
            }

            function loadQuestionsForTest(testSlug) {
                const matchingRows = allCsvRows.filter(row => {
                    return slugify(row[0].trim()) === testSlug;
                });

                if (matchingRows.length === 0) return null;

                // The test_id (column A) becomes the quiz title
                C.quizTitle = matchingRows[0][0].trim();
                document.title = `${C.appName || 'Testbook'} | ${C.quizTitle}`;

                // Read per-test config from first row: H(7)=Positive, I(8)=Negative, J(9)=Time(min)
                const firstRow = matchingRows[0];
                const csvPositive = (firstRow.length > 7 && firstRow[7].trim()) ? parseFloat(firstRow[7].trim()) : null;
                const csvNegative = (firstRow.length > 8 && firstRow[8].trim()) ? parseFloat(firstRow[8].trim()) : null;
                const csvTimeMin = (firstRow.length > 9 && firstRow[9].trim()) ? parseInt(firstRow[9].trim()) : null;

                C.questions = matchingRows.map((row, index) => {
                    const statement = cleanQuestionText(row[1] || '');
                    const options = [
                        cleanOptionText(row[2] || ''),
                        cleanOptionText(row[3] || ''),
                        cleanOptionText(row[4] || ''),
                        cleanOptionText(row[5] || '')
                    ];
                    const correctIndex = parseCorrectAnswer(row[6] || '');

                    return {
                        id: index,
                        text: statement,
                        options: options,
                        correctIndex: correctIndex,
                        explanation: (row[6] || '').trim(),
                        reference: ''
                    };
                });

                // Priority: URL params > CSV columns H/I/J > quiz-data defaults
                const params = getUrlParams();
                const qCount = C.questions.length;

                // Positive marking
                if (params.get('pos')) {
                    C.positiveMarking = parseFloat(params.get('pos'));
                } else if (csvPositive !== null && !isNaN(csvPositive)) {
                    C.positiveMarking = csvPositive;
                }
                if (!C.positiveMarking) C.positiveMarking = 1;

                // Negative marking
                if (params.get('neg')) {
                    C.negativeMarking = parseFloat(params.get('neg'));
                } else if (csvNegative !== null && !isNaN(csvNegative)) {
                    C.negativeMarking = csvNegative;
                }
                if (C.negativeMarking === undefined) C.negativeMarking = 0;

                // Time: URL param (min) > CSV col J (min) > timePerQuestion * qCount > 2min * qCount
                if (params.get('time')) {
                    C.totalTime = parseInt(params.get('time')) * 60;
                } else if (csvTimeMin !== null && !isNaN(csvTimeMin)) {
                    C.totalTime = csvTimeMin * 60;
                } else {
                    const timePerQ = C.timePerQuestion || 2;
                    C.totalTime = qCount * timePerQ * 60;
                }

                const totalMinutes = Math.floor(C.totalTime / 60);
                const maxMarks = qCount * C.positiveMarking;
                C.instructionStrings.instruction1 = `The quiz contains ${qCount} questions.`;
                C.instructionStrings.totalTime = `Time: ${totalMinutes} minutes`;
                C.instructionStrings.totalMarks = `Total Marks: ${maxMarks}`;
                C.instructionStrings.instruction3 = `You will have ${totalMinutes} minutes to complete the quiz.`;
                if (C.negativeMarking > 0) {
                    C.instructionStrings.instruction4 = `Negative marking applies: ${C.negativeMarking} marks will be deducted for each incorrect answer.`;
                } else {
                    C.instructionStrings.instruction4 = 'There is no negative marking.';
                }
                C.instructionStrings.instruction5 = `${C.positiveMarking} mark(s) will be awarded for each correct answer.`;

                return C.questions;
            }

            // Legacy: load questions without test_id column (backward compat)
            async function loadQuestionsFromCSV() {
                try {
                    let text;
                    try {
                        const resp = await fetch('Questions.csv');
                        if (resp.ok) text = await resp.text();
                    } catch (e) { }
                    if (!text) text = document.getElementById('csv-data').textContent;
                    const rows = parseCSV(text);

                    // Skip header row
                    const dataRows = rows.slice(1);

                    C.questions = dataRows.filter(row => {
                        // Skip rows where statement is empty or all fields empty
                        return row[0] && row[0].trim() !== '' && row.length >= 5;
                    }).map((row, index) => {
                        const statement = cleanQuestionText(row[0] || '');
                        const options = [
                            cleanOptionText(row[1] || ''),
                            cleanOptionText(row[2] || ''),
                            cleanOptionText(row[3] || ''),
                            cleanOptionText(row[4] || '')
                        ];
                        const correctIndex = parseCorrectAnswer(row[5] || '');

                        return {
                            id: index,
                            text: statement,
                            options: options,
                            correctIndex: correctIndex,
                            explanation: (row[5] || '').trim(),
                            reference: ''
                        };
                    });

                    // Update dynamic config based on loaded question count
                    const qCount = C.questions.length;
                    if (!C.positiveMarking) C.positiveMarking = 1;
                    if (C.negativeMarking === undefined) C.negativeMarking = 0;
                    if (!C.totalTime) C.totalTime = qCount * 120;

            }

            function toggleTheme() {
                document.body.classList.toggle('dark-theme');
                updateThemeToggleUI();
            }

            function updateThemeToggleUI() {
                const themeBtn = document.getElementById('themeToggleBtn');
                const themeIcon = document.getElementById('themeToggleIcon');
                if (themeIcon) {
                    themeIcon.textContent = document.body.classList.contains('dark-theme') ? '☀️' : '🌙';
                }
            }

            // --- START TEST POPUP ---

            function showStartTestPopup() {
                const totalMinutes = Math.floor(C.totalTime / 60);
                const maxMarks = S.questions.length * C.positiveMarking;
                const overlay = document.createElement('div');
                overlay.className = 'start-test-overlay';
                overlay.id = 'startTestOverlay';
                overlay.innerHTML = `
                    <div class="start-test-modal">
                        <h2>${C.quizTitle}</h2>
                        <div class="modal-info">
                            <span><strong>Questions:</strong> ${S.questions.length}</span>
                            <span><strong>Duration:</strong> ${totalMinutes} Minutes</span>
                            <span><strong>Maximum Marks:</strong> ${maxMarks}</span>
                            <span><strong>Negative Marking:</strong> ${C.negativeMarking > 0 ? C.negativeMarking + ' per wrong answer' : 'None'}</span>
                        </div>
                        <button class="btn-start-test" id="startTestBtn">Start Test</button>
                    </div>
                `;
                document.body.appendChild(overlay);
                document.getElementById('startTestBtn').onclick = () => {
                    overlay.remove();
                    startQuiz();
                };
            }

            function showScreen(screenName, extraData) {
                document.querySelectorAll('.card').forEach(s => s.classList.add('hidden'));
                const screenEl = document.getElementById(screenName + 'Screen');

                if (screenName === 'testPicker') render(testPickerTemplate(extraData), screenEl);
                if (screenName === 'quiz') render(quizTemplate(), screenEl);
                if (screenName === 'results') render(resultsTemplate(), screenEl);
                if (screenName === 'review') render(reviewTemplate(), screenEl);

                screenEl.classList.remove('hidden');
                S.appPhase = screenName;
                addEventListeners(); // Re-add listeners for new DOM

                if (screenName === 'quiz') postQuizRender();
                if (screenName === 'results') postResultsRender();
                if (screenName === 'review') postReviewRender();
            }

            // --- SCREEN-SPECIFIC LOGIC & LISTENERS ---
            function addEventListeners() {
                if (S.appPhase === 'quiz') {
                    const timerCheckbox = document.getElementById('timerToggleCheckbox');
                    if (timerCheckbox) timerCheckbox.onchange = handleTimerToggle;
                    const timerCheckboxMobile = document.getElementById('timerToggleCheckboxMobile');
                    if (timerCheckboxMobile) timerCheckboxMobile.onchange = handleTimerToggle;
                    document.getElementById('fullscreenBtn').onclick = toggleFullScreen;
                    document.getElementById('markReviewBtn').onclick = handleMarkForReview;
                    document.getElementById('clearResponseBtn').onclick = handleClearResponse;
                    document.getElementById('saveNextBtn').onclick = handleSaveAndNext;
                    document.getElementById('submitQuizBtn').onclick = submitQuiz;
                    document.getElementById('sidebarToggle').onclick = toggleSidebar;
                    const themeBtn = document.getElementById('themeToggleBtn');
                    if (themeBtn) {
                        themeBtn.onclick = toggleTheme;
                        updateThemeToggleUI();
                    }
                }



                else if (S.appPhase === 'results') {
                    document.getElementById('reviewAnswersBtn').onclick = startReview;
                    document.getElementById('reattemptQuizBtn').onclick = startQuiz;
                }

                else if (S.appPhase === 'review') {
                    document.getElementById('exitReviewBtn').onclick = () => showScreen('results');
                    document.getElementById('prevReviewBtn').onclick = () => navigateReview(-1);
                    document.getElementById('nextReviewBtn').onclick = () => navigateReview(1);
                    document.getElementById('toggleExplanationBtn').onclick = toggleExplanation;
                }
            }

            function startQuiz() {
                S.currentQuestionIndex = 0;
                S.timeLeft = C.totalTime;

                S.questionTimes = S.questions.map(() => 0);
                S.userAnswers = S.questions.map(q => ({
                    questionId: q.id, selectedOptionIndex: null, status: C.QuestionStatus.NotVisited, isMarked: false,
                }));
                S.userAnswers[0].status = C.QuestionStatus.NotAnswered;
                showScreen('quiz');

                // Try to enter fullscreen
                document.documentElement.requestFullscreen().catch(err => {
                    console.warn('Could not automatically enter fullscreen: ' + err.message);
                });
            }

            function postQuizRender() {
                updateTimerDisplay();
                renderQuestion();
                renderPalette();
                updateQuestionTimerDisplay();
                if (!S.timerInterval) startTimer();

                // Shorten button labels on mobile
                if (window.innerWidth <= 768) {
                    const markBtn = document.getElementById('markReviewBtn');
                    const clearBtn = document.getElementById('clearResponseBtn');
                    if (markBtn) markBtn.textContent = 'Mark & Next';
                    if (clearBtn) clearBtn.textContent = 'Clear';
                }
            }

            function renderQuestion() {
                const q = S.questions[S.currentQuestionIndex];
                if (!q) return;

                const isMobile = window.innerWidth <= 768;

                const qNumEl = document.getElementById('questionNumber');
                if (qNumEl) {
                    qNumEl.textContent = isMobile ? (S.currentQuestionIndex + 1) : `Question No. ${S.currentQuestionIndex + 1}`;
                }

                const badgeSuccess = document.querySelector('.badge-success');
                const badgeDanger = document.querySelector('.badge-danger');
                if (badgeSuccess) badgeSuccess.textContent = "+" + (C.positiveMarking ? C.positiveMarking : 1).toFixed(1);
                if (badgeDanger) badgeDanger.textContent = "-" + (C.negativeMarking ? C.negativeMarking.toFixed(1) : "0.0");

                const qTextEl = document.getElementById('questionText');
                if (qTextEl) qTextEl.innerHTML = q.text;

                const opts = document.getElementById('optionsContainer');
                if (opts) {
                    opts.innerHTML = '';
                    const answer = S.userAnswers[S.currentQuestionIndex];

                    q.options.forEach((opt, i) => {
                        const btn = document.createElement('button');
                        btn.className = 'option-btn';
                        if (answer.selectedOptionIndex === i) btn.classList.add('selected');

                        btn.innerHTML = `<span class="option-prefix">${isMobile ? (i + 1) + '.' : ''}</span><span>${opt}</span>`;
                        btn.onclick = () => selectOption(i);
                        opts.appendChild(btn);
                    });
                }

                const saveBtn = document.getElementById('saveNextBtn');
                if (saveBtn) saveBtn.textContent = (S.currentQuestionIndex === S.questions.length - 1) ? 'Save & Finish' : 'Save & Next';
                updateQuestionTimerDisplay();

                // Re-typeset MathJax for dynamically loaded content
                if (window.MathJax && MathJax.typesetPromise) {
                    MathJax.typesetPromise().catch(function (err) {
                        console.warn('MathJax typeset error:', err);
                    });
                }
            }
            function renderPalette() {
                const p = document.getElementById('questionPalette');
                p.innerHTML = '';

                S.userAnswers.forEach((ans, i) => {
                    const item = document.createElement('div');
                    item.className = `palette-item status-${ans.status}`;
                    if (i === S.currentQuestionIndex) item.classList.add('current');
                    item.textContent = i + 1;
                    item.onclick = () => navigateToQuestion(i);
                    p.appendChild(item);
                });

                // Update legend counts
                const counts = { answered: 0, markedForReview: 0, notVisited: 0, answeredAndMarked: 0, notAnswered: 0 };
                S.userAnswers.forEach(a => { if (counts[a.status] !== undefined) counts[a.status]++; });
                const legendItems = document.querySelectorAll('.sidebar-legend .legend-item');
                if (legendItems.length >= 5) {
                    legendItems[0].querySelector('div').textContent = counts.answered;
                    legendItems[1].querySelector('div').textContent = counts.markedForReview;
                    legendItems[2].querySelector('div').textContent = counts.notVisited;
                    legendItems[3].querySelector('div').textContent = counts.answeredAndMarked;
                    legendItems[4].querySelector('div').textContent = counts.notAnswered;
                }
            }

            function selectOption(index) {
                const answer = S.userAnswers[S.currentQuestionIndex];
                answer.selectedOptionIndex = index;
                answer.status = answer.isMarked ? C.QuestionStatus.AnsweredAndMarked : C.QuestionStatus.Answered;
                renderQuestion(); renderPalette();

                if (S.autoNext && S.currentQuestionIndex < S.questions.length - 1) {
                    setTimeout(() => navigateToQuestion(S.currentQuestionIndex + 1), 300);
                }
            }

            function updateQuestionTimerDisplay() {
                const el = document.getElementById('questionTimer');
                const elMobile = document.getElementById('questionTimerMobile');
                if (!S.questionTimes) return;
                const t = S.questionTimes[S.currentQuestionIndex] || 0;
                const m = Math.floor(t / 60).toString().padStart(2, '0');
                const s = (t % 60).toString().padStart(2, '0');
                const timeStr = m + ':' + s;
                if (el) el.textContent = timeStr;
                if (elMobile) elMobile.textContent = timeStr;
            }

            function navigateToQuestion(index) {
                if (index === S.currentQuestionIndex) return;
                S.currentQuestionIndex = index;
                const answer = S.userAnswers[index];
                if (answer.status === C.QuestionStatus.NotVisited) answer.status = C.QuestionStatus.NotAnswered;
                renderQuestion(); renderPalette();
            }

            function handleSaveAndNext() {
                if (S.currentQuestionIndex < S.questions.length - 1) navigateToQuestion(S.currentQuestionIndex + 1);
                else submitQuiz();
            }

            function handleMarkForReview() {
                const answer = S.userAnswers[S.currentQuestionIndex];
                answer.isMarked = !answer.isMarked;
                answer.status = answer.selectedOptionIndex !== null ? (answer.isMarked ? C.QuestionStatus.AnsweredAndMarked : C.QuestionStatus.Answered) : (answer.isMarked ? C.QuestionStatus.MarkedForReview : C.QuestionStatus.NotAnswered);
                handleSaveAndNext();
            }

            function handleClearResponse() {
                const answer = S.userAnswers[S.currentQuestionIndex];
                answer.selectedOptionIndex = null;
                answer.status = answer.isMarked ? C.QuestionStatus.MarkedForReview : C.QuestionStatus.NotAnswered;
                renderQuestion(); renderPalette();
            }

            function submitQuiz() {
                if (confirm('Are you sure you want to submit the test?')) {
                    stopTimer();
                    calculateResults();
                    showScreen('results');
                }
            }

            // --- TIMER ---
            function startTimer() {
                stopTimer(); S.timerInterval = setInterval(tick, 1000);
            }

            function stopTimer() {
                clearInterval(S.timerInterval); S.timerInterval = null;
            }

            function tick() {
                if (S.isTimerPaused) return;
                S.timeLeft--;
                if (S.questionTimes) S.questionTimes[S.currentQuestionIndex]++;
                updateTimerDisplay();
                updateQuestionTimerDisplay();

                if (S.timeLeft <= 0) {
                    alert('Time is up!'); submitQuiz();
                }
            }

            function updateTimerDisplay() {
                const totalSeconds = S.timeLeft;
                const hours = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
                const mins = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
                const secs = (totalSeconds % 60).toString().padStart(2, '0');

                const hourEl = document.getElementById('timer-hour');
                const minEl = document.getElementById('timer-min');
                const secEl = document.getElementById('timer-sec');

                if (hourEl) hourEl.textContent = hours;
                if (minEl) minEl.textContent = mins;
                if (secEl) secEl.textContent = secs;
            }
            function handleTimerToggle(e) {
                const isOn = e.target.checked;
                S.isTimerPaused = !isOn;
                // Sync both checkboxes
                const desktop = document.getElementById('timerToggleCheckbox');
                const mobile = document.getElementById('timerToggleCheckboxMobile');
                if (desktop) desktop.checked = isOn;
                if (mobile) mobile.checked = isOn;
                // Update status label
                const statusEl = document.getElementById('timerToggleStatus');
                if (statusEl) {
                    statusEl.textContent = isOn ? 'ON' : 'OFF';
                    statusEl.classList.toggle('active', isOn);
                }
            }

            function toggleTimerPause() {
                S.isTimerPaused = !S.isTimerPaused;
                const isOn = !S.isTimerPaused;
                const desktop = document.getElementById('timerToggleCheckbox');
                const mobile = document.getElementById('timerToggleCheckboxMobile');
                if (desktop) desktop.checked = isOn;
                if (mobile) mobile.checked = isOn;
                const statusEl = document.getElementById('timerToggleStatus');
                if (statusEl) {
                    statusEl.textContent = isOn ? 'ON' : 'OFF';
                    statusEl.classList.toggle('active', isOn);
                }
            }

            // --- RESULTS ---
            function calculateResults() {
                let correct = 0, incorrect = 0, unattempted = 0, score = 0, negativeMarksApplied = 0;

                const posMarks = C.positiveMarking || 1;
                const negMarks = C.negativeMarking || 0;
                S.userAnswers.forEach((ua, i) => {
                    const q = S.questions[i];
                    if (ua.selectedOptionIndex === null) unattempted++;

                    else if (ua.selectedOptionIndex === q.correctIndex) {
                        correct++; score += posMarks;
                    }

                    else {
                        incorrect++; score -= negMarks; negativeMarksApplied += negMarks;
                    }
                });
                score = Math.max(0, score);
                const total = S.questions.length;
                const maxMarks = total * posMarks;
                const percentage = maxMarks > 0 ? (score / maxMarks) * 100 : 0;

                S.quizResults = {
                    correct, incorrect, unattempted, score: score.toFixed(2), percentage: percentage.toFixed(1), totalQuestions: total, maxMarks, negativeMarksApplied
                }

                    ;
            }

            function getMotivationalFeedback(percentage) {
                if (percentage >= 85) return {
                    title: "Outstanding!", message: "Future Officer, you have a strong grasp of the material.", color: 'var(--color-correct)', bgColor: 'var(--bg-correct)'
                }

                    ;

                if (percentage >= 70) return {
                    title: "Great Job!", message: "You're on the right track. Review your mistakes!", color: '#4361ee', bgColor: '#e0e7ff'
                }

                    ;

                if (percentage >= 50) return {
                    title: "Solid Effort!", message: "There's room for improvement. Keep practicing!", color: 'var(--color-unattempted)', bgColor: 'var(--bg-unattempted)'
                }

                    ;

                return {
                    title: "Keep Going!", message: "Don't be discouraged! This is a learning opportunity.", color: 'var(--color-incorrect)', bgColor: 'var(--bg-incorrect)'
                }

                    ;
            }

            function postResultsRender() {
                const chartContainer = document.getElementById('chart-container');
                chartContainer.innerHTML = '';

                const data = [
                    { label: 'Correct', value: S.quizResults.correct, color: 'var(--color-correct)' },
                    { label: 'Incorrect', value: S.quizResults.incorrect, color: 'var(--color-incorrect)' },
                    { label: 'Unattempted', value: S.quizResults.unattempted, color: 'var(--color-unattempted)' }
                ];

                data.forEach(item => {
                    const barWrapper = document.createElement('div');
                    barWrapper.style.marginBottom = '1rem';
                    const percent = (item.value / S.quizResults.totalQuestions) * 100;

                    barWrapper.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.25rem;">
                            <span class="font-semibold text-sm" style="color: ${item.color};">${item.label}</span>
                            <span class="text-sm font-medium">${item.value} / ${S.quizResults.totalQuestions}</span>
                        </div>
                        <div class="css-bar">
                            <div class="css-bar-fill" style="width: 0%; background: ${item.color};" data-percent="${percent}"></div>
                        </div>`;
                    chartContainer.appendChild(barWrapper);
                });

                // Animate bars
                setTimeout(() => {
                    document.querySelectorAll('.css-bar-fill').forEach(bar => {
                        bar.style.width = bar.getAttribute('data-percent') + '%';
                    });
                }, 100);
            }

            // --- REVIEW ---
            function startReview() {
                S.reviewIndex = 0; showScreen('review');
            }

            function postReviewRender() {
                renderReviewQuestion();
                renderReviewPalette();
            }

            function renderReviewQuestion() {
                const q = S.questions[S.reviewIndex];
                const ua = S.userAnswers[S.reviewIndex];

                const statusInfo = ua.selectedOptionIndex === null
                    ? { text: 'Unattempted', color: 'var(--color-unattempted)', icon: 'minus-circle' }
                    : ua.selectedOptionIndex === q.correctIndex
                        ? { text: 'Correct', color: 'var(--color-correct)', icon: 'check-circle' }
                        : { text: 'Incorrect', color: 'var(--color-incorrect)', icon: 'x-circle' };

                document.getElementById('reviewQuestionNumber').textContent = `Question ${S.reviewIndex + 1} of ${S.questions.length}`;
                const statusEl = document.getElementById('reviewQuestionStatus');
                statusEl.innerHTML = `<svg class="svg-icon" style="width:1.25rem;height:1.25rem; margin-right: 0.5rem;"><use href="#icon-${statusInfo.icon}"></use></svg> ${statusInfo.text}`;
                statusEl.style.color = statusInfo.color;

                document.getElementById('reviewQuestionText').innerHTML = q.text;
                const opts = document.getElementById('reviewOptionsContainer');
                opts.innerHTML = '';

                q.options.forEach((opt, i) => {
                    const div = document.createElement('div');
                    div.className = 'option-btn review-option';

                    const isCorrect = i === q.correctIndex;
                    const isUserSelected = i === ua.selectedOptionIndex;

                    if (isCorrect) div.classList.add('correct');
                    else if (isUserSelected) div.classList.add('incorrect');
                    else div.classList.add('not-selected');

                    if (isUserSelected) div.classList.add('user-selected');

                    let iconHtml = '';
                    if (isCorrect) iconHtml = `<svg class="svg-icon" style="width:1.5rem;height:1.5rem;color:var(--color-correct);"><use href="#icon-check-circle"></use></svg>`;
                    if (isUserSelected && !isCorrect) iconHtml = `<svg class="svg-icon" style="width:1.5rem;height:1.5rem;color:var(--color-incorrect);"><use href="#icon-x-circle"></use></svg>`;

                    div.innerHTML = `<div><span class="option-prefix">${String.fromCharCode(65 + i)}.</span><span>${opt}</span></div> ${iconHtml}`;
                    opts.appendChild(div);
                });
                document.getElementById('explanationText').innerHTML = q.explanation || '';
                document.getElementById('prevReviewBtn').disabled = S.reviewIndex === 0;
                document.getElementById('nextReviewBtn').disabled = S.reviewIndex === S.questions.length - 1;

                // Update sidebar stats
                document.getElementById('review-sidebar-stats').innerHTML = `<ul class="summary-list text-sm"><li><span>Status:</span> <span class="font-semibold" style="color: ${statusInfo.color};">${statusInfo.text}</span></li></ul>`;

                // Re-typeset MathJax for review content
                if (window.MathJax && MathJax.typesetPromise) {
                    MathJax.typesetPromise().catch(function (err) {
                        console.warn('MathJax typeset error:', err);
                    });
                }
            }

            function renderReviewPalette() {
                const palette = document.getElementById('review-palette');
                palette.innerHTML = '';

                S.questions.forEach((q, i) => {
                    const ua = S.userAnswers[i];
                    const item = document.createElement('div');
                    item.className = 'palette-item';

                    if (ua.selectedOptionIndex === null) item.classList.add('unattempted');
                    else if (ua.selectedOptionIndex === q.correctIndex) item.classList.add('correct');
                    else item.classList.add('incorrect');

                    if (i === S.reviewIndex) item.classList.add('current');

                    item.textContent = i + 1;

                    item.onclick = () => {
                        S.reviewIndex = i;
                        renderReviewQuestion();
                        renderReviewPalette(); // To update the 'current' item
                        document.getElementById('reviewExplanation').classList.add('hidden');
                        document.getElementById('toggleExplanationBtn').textContent = 'Show Solution';
                    }

                        ;
                    palette.appendChild(item);
                });
            }


            function navigateReview(dir) {
                const newIndex = S.reviewIndex + dir;

                if (newIndex >= 0 && newIndex < S.questions.length) {
                    S.reviewIndex = newIndex;
                    renderReviewQuestion();
                    renderReviewPalette();
                    document.getElementById('reviewExplanation').classList.add('hidden');
                    document.getElementById('toggleExplanationBtn').textContent = 'Show Solution';
                }
            }

            function toggleExplanation() {
                const exp = document.getElementById('reviewExplanation');
                const btn = document.getElementById('toggleExplanationBtn');
                const isHidden = exp.classList.toggle('hidden');
                btn.textContent = isHidden ? 'Show Solution' : 'Hide Solution';
            }

            // --- HELPERS ---
            function toggleFullScreen() {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(err => console.error(err));
                else if (document.exitFullscreen) document.exitFullscreen();
            }

            document.addEventListener('fullscreenchange', () => {
                S.isFullScreen = !!document.fullscreenElement;
                const qc = document.querySelector('.quiz-container');
                if (qc) qc.classList.toggle('fullscreen', S.isFullScreen);
                const btn = document.getElementById('fullscreenBtn');
                if (btn) btn.textContent = S.isFullScreen ? 'Exit Full Screen' : 'Switch Full Screen';
            });

            function toggleSidebar() {
                const sb = document.getElementById('quizSidebar');
                const sbt = document.getElementById('sidebarToggle');

                if (window.innerWidth <= 768) {
                    // Mobile: toggle sidebar-open class and backdrop
                    sb.classList.toggle('sidebar-open');
                    const isOpen = sb.classList.contains('sidebar-open');
                    let backdrop = document.getElementById('sidebarBackdrop');
                    if (!backdrop) {
                        backdrop = document.createElement('div');
                        backdrop.id = 'sidebarBackdrop';
                        backdrop.className = 'sidebar-backdrop';
                        backdrop.onclick = toggleSidebar;
                        sb.parentElement.insertBefore(backdrop, sb);
                    }
                    backdrop.classList.toggle('active', isOpen);
                    sbt.innerHTML = isOpen
                        ? `<svg class="svg-icon"><use href="#icon-chevron-right"></use></svg>`
                        : `<svg class="svg-icon"><use href="#icon-chevron-left"></use></svg>`;
                } else {
                    // Desktop: toggle collapsed class
                    S.isSidebarCollapsed = !S.isSidebarCollapsed;
                    sb.classList.toggle('collapsed', S.isSidebarCollapsed);
                    sbt.innerHTML = S.isSidebarCollapsed
                        ? `<svg class="svg-icon"><use href="#icon-chevron-left"></use></svg>`
                        : `<svg class="svg-icon"><use href="#icon-chevron-right"></use></svg>`;
                }
            }

            init();
        });
    </script>
