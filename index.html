<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Testbook | Mock Tests</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(','\\)'], ['$', '$']],
        processEscapes: true
      },
      svg: {
        fontCache: 'global'
      }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary-color: #4361ee;
            --primary-dark: #3a56d4;
            --color-correct: #28a745;
            --color-incorrect: #dc3545;
            --color-unattempted: #ffc107;
            --color-marked: #805ad5;
            --color-not-answered: #c53030;
            --color-answered: #2f855a;
            --color-answered-marked: #2c5282;

            --bg-correct: #f0fff4;
            --bg-incorrect: #fff5f5;
            --bg-unattempted: #fffff0;
            --bg-marked: #faf5ff;
            --bg-not-answered: #fed7d7;
            --bg-answered: #c6f6d5;
            --bg-answered-marked: #bee3f8;
            --bg-not-visited: #edf2f7;

            --border-correct: #9ae6b4;
            --border-incorrect: #feb2b2;
            --border-unattempted: #fefcbf;
            --border-marked: #e9d8fd;
            --border-not-answered: #f56565;
            --border-answered: #68d391;
            --border-answered-marked: #90cdf4;
            --border-not-visited: #e2e8f0;

            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);

            --sidebar-width: 320px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: white;
            color: #2d3748;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Hidden SVG Sprite */
        .svg-sprite {
            display: none;
        }

        .hidden {
            display: none !important;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .card {
            background-color: white;
            border-radius: 1rem;
            box-shadow: var(--shadow-xl);
            overflow: hidden;
            width: 100%;
        }

        /* --- Test Picker Screen --- */
        .test-picker-body {
            padding: 2rem;
        }

        .test-picker-heading {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .test-picker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
        }

        .test-picker-card {
            display: block;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            padding: 1.25rem 1.5rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
        }

        .test-picker-card:hover {
            border-color: var(--primary-color);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .test-picker-card-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 0.35rem;
        }

        .test-picker-card-meta {
            font-size: 0.85rem;
            color: #718096;
        }

        /* --- Instructions Screen --- */
        .instructions-card {
            max-width: 800px;
        }

        .instructions-content {
            padding: 2rem;
        }

        .instructions-content h1 {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            color: #1a202c;
            margin-bottom: 1.5rem;
        }

        .instructions-summary {
            background-color: #edf2f7;
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            margin-bottom: 1.5rem;
        }

        .instructions-list {
            list-style: none;
            padding-left: 0;
            margin-bottom: 1.5rem;
        }

        .instructions-list li {
            padding-left: 1.5rem;
            position: relative;
            margin-bottom: 0.5rem;
        }

        .instructions-list li::before {
            content: '✔';
            position: absolute;
            left: 0;
            color: var(--primary-color);
        }

        .instructions-actions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        @media(min-width: 640px) {
            .instructions-actions {
                flex-direction: row;
                justify-content: space-between;
            }
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: #e2e8f0;
            color: #4a5568;
        }

        .btn-secondary:hover {
            background-color: #cbd5e0;
        }

        /* --- Quiz Screen --- */
        .quiz-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            max-height: 100vh;
            max-height: 100dvh;
            max-width: 1600px;
        }

        .quiz-container.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            z-index: 9999;
            border-radius: 0;
        }

        /* --- Quiz Screen Redesign --- */
        .quiz-top-bar {
            background-color: white;
            color: #333;
            padding: 0 1rem;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
            z-index: 10;
        }

        .quiz-header-logo {
            height: 24px;
        }

        .top-bar-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .timer-display {
            background-color: #f8f9fa;
            border: 1px solid #e0e0e0;
            padding: 4px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.875rem;
            font-weight: 600;
            color: #333;
            font-family: monospace;
        }

        .timer-box {
            background: #333;
            color: white;
            padding: 0 4px;
            border-radius: 2px;
            margin: 0 1px;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-top-control {
            background: white;
            border: 1px solid #007bff;
            color: #007bff;
            padding: 4px 12px;
            font-size: 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-top-control:hover {
            background: #f0f7ff;
        }

        /* Section Bar */
        .section-bar {
            background-color: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 0 1rem;
            height: 40px;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-shrink: 0;
        }

        .section-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
        }

        .section-tab {
            background-color: #0d4e6d;
            /* Dark teal/blue from image */
            color: white;
            padding: 4px 16px;
            border-radius: 4px 4px 0 0;
            /* Tab shape */
            font-size: 0.875rem;
            cursor: pointer;
            height: 100%;
            display: flex;
            align-items: center;
            margin-top: 4px;
            /* Push down to sit on line */
        }

        .quiz-main-area {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
            position: relative;
        }

        .question-pane {
            flex-grow: 1;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .question-header {
            background-color: white;
            padding: 0;
            border-bottom: 1px solid #eee;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .question-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .question-no {
            font-weight: 700;
            font-size: 1rem;
        }

        .question-info-right {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.75rem;
            color: #666;
        }

        .marking-scheme {
            display: flex;
            gap: 4px;
        }

        .badge-success {
            background: #28a745;
            color: white;
            padding: 0 4px;
            border-radius: 2px;
        }

        .badge-danger {
            background: #dc3545;
            color: white;
            padding: 0 4px;
            border-radius: 2px;
        }

        .view-in-select {
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            padding: 2px 4px;
            font-size: 0.75rem;
        }

        .question-text {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            white-space: pre-line;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option-btn {
            text-align: left;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            background-color: white;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: flex-start;
        }

        .option-btn:hover {
            border-color: var(--primary-color);
            background-color: #f7fafc;
        }

        .option-btn.selected {
            background-color: transparent;
            color: #333;
            border-color: transparent;
            font-weight: 400;
        }

        .option-btn.correct {
            background-color: var(--bg-correct);
            border-color: var(--border-correct);
            color: var(--color-answered);
        }

        .option-btn.incorrect {
            background-color: var(--bg-incorrect);
            border-color: var(--border-incorrect);
            color: var(--color-not-answered);
        }

        .option-btn .option-prefix {
            font-weight: 600;
            margin-right: 0.5rem;
            color: var(--primary-color);
        }

        .option-btn.selected .option-prefix {
            color: var(--primary-color);
        }

        .question-actions {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }

        @media(min-width: 640px) {
            .question-actions {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Sidebar Redesign */
        .quiz-sidebar {
            width: 300px;
            background: #eef4fa;
            border-left: 1px solid #d0d0d0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s ease;
            z-index: 20;
            overflow: hidden;
            padding: 0;
        }

        .sidebar-user-info {
            background: #dbeafe;
            padding: 0.5rem 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 1px solid #cbd5e0;
            flex-shrink: 0;
        }

        .sidebar-legend {
            background: white;
            padding: 0.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            font-size: 0.7px;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: #444;
        }

        .bg-answered {
            background-color: #28a745;
            clip-path: polygon(0% 0%, 75% 0%, 100% 50%, 75% 100%, 0% 100%);
            border-radius: 4px;
            width: 18px;
            height: 16px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .bg-marked {
            background-color: #805ad5;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .bg-not-visited {
            background-color: #fff;
            border: 1px solid #ccc;
            color: #333;
            border-radius: 4px;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .bg-marked-answered {
            background-color: #805ad5;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            position: relative;
        }

        .bg-marked-answered::after {
            content: '✓';
            position: absolute;
            bottom: -4px;
            right: -4px;
            background: #28a745;
            border-radius: 50%;
            width: 10px;
            height: 10px;
            font-size: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .bg-not-answered {
            background-color: #dc3545;
            clip-path: polygon(0% 0%, 75% 0%, 100% 50%, 75% 100%, 0% 100%);
            border-radius: 4px;
            width: 18px;
            height: 16px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .palette-section-header {
            background: #4a90e2;
            /* Blue header for section */
            color: white;
            padding: 4px 8px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .palette-grid {
            padding: 0.5rem;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            overflow-y: auto;
            flex: 1;
            align-content: start;
            background: #eef4fa;
        }

        .palette-grid .palette-item {
            width: 100%;
            height: 28px;
            border: 1px solid #ccc;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 2px;
            margin: 0;
            color: #333;
        }

        .palette-grid .palette-item:hover {
            background: #f0f0f0;
        }

        .palette-grid .palette-item.current {
            border: 2px solid #333;
        }

        .palette-grid .palette-item.status-answered {
            background-color: #28a745;
            color: white;
            clip-path: polygon(0% 0%, 80% 0%, 100% 50%, 80% 100%, 0% 100%);
            border: none;
        }

        .palette-grid .palette-item.status-notAnswered {
            background-color: #dc3545;
            color: white;
            clip-path: polygon(0% 0%, 80% 0%, 100% 50%, 80% 100%, 0% 100%);
            border: none;
        }

        .palette-grid .palette-item.status-markedForReview {
            background-color: #805ad5;
            color: white;
            border-radius: 50%;
            border: none;
        }

        .palette-grid .palette-item.status-answeredAndMarked {
            background-color: #805ad5;
            color: white;
            border-radius: 50%;
            border: none;
            position: relative;
        }

        .palette-grid .palette-item.status-answeredAndMarked::after {
            content: '✓';
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: #28a745;
            border-radius: 50%;
            width: 8px;
            height: 8px;
            font-size: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-bottom-actions {
            background: #dbeafe;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            border-top: 1px solid #d0d0d0;
            flex-shrink: 0;
        }

        .sidebar-action-row {
            display: flex;
            gap: 0.5rem;
        }

        .btn-sidebar-action {
            flex: 1;
            background: #cbd5e0;
            border: 1px solid #a0aec0;
            color: #2d3748;
            padding: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 2px;
            font-weight: 500;
        }

        .btn-submit-test {
            width: 100%;
            background: #00a9e0;
            color: white;
            border: none;
            padding: 8px;
            font-weight: 600;
            border-radius: 2px;
            cursor: pointer;
        }

        .quiz-sidebar.collapsed {
            transform: translateX(100%);
            width: 0;
            padding: 0;
            border-left: none;
            overflow: hidden;
        }

        .sidebar-toggle {
            position: absolute;
            top: 50%;
            right: 300px;
            transform: translateY(-50%);
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px 0 0 4px;
            padding: 0.75rem 0.25rem;
            cursor: pointer;
            z-index: 25;
            transition: right 0.3s ease;
        }

        .quiz-sidebar.collapsed+.sidebar-toggle {
            right: 0;
        }

        .sidebar-toggle svg {
            width: 1.25rem;
            height: 1.25rem;
        }

        .palette-header {
            text-align: center;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .question-palette {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .palette-item {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.25rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .palette-item.current {
            border-color: var(--primary-dark);
            transform: scale(1.1);
            box-shadow: var(--shadow-md);
        }

        .palette-item.correct {
            background-color: var(--bg-answered);
            border: 1px solid var(--border-answered);
            color: var(--color-answered);
        }

        .palette-item.incorrect {
            background-color: var(--bg-incorrect);
            border: 1px solid var(--border-incorrect);
            color: var(--color-incorrect);
        }

        .palette-item.unattempted {
            background-color: #f7fafc;
            border: 1px solid #e2e8f0;
            color: #4a5568;
        }


        /* Palette Status Colors */
        .status-notVisited {
            background-color: var(--bg-not-visited);
            border-color: var(--border-not-visited);
            color: #4a5568;
        }

        .status-notAnswered {
            background-color: var(--bg-not-answered);
            border-color: var(--border-not-answered);
            color: var(--color-not-answered);
        }

        .status-answered {
            background-color: var(--bg-answered);
            border-color: var(--border-answered);
            color: var(--color-answered);
        }

        .status-markedForReview {
            background-color: var(--bg-marked);
            border-color: var(--border-marked);
            color: var(--color-marked);
            position: relative;
        }

        .status-answeredAndMarked {
            background-color: var(--bg-answered-marked);
            border-color: var(--border-answered-marked);
            color: var(--color-answered-marked);
            position: relative;
        }

        .status-markedForReview::after,
        .status-answeredAndMarked::after {
            content: '';
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            background-color: var(--color-marked);
            border-radius: 50%;
        }

        /* --- Results Screen --- */
        .results-card {
            max-width: 1000px;
            background-color: #f7fafc;
        }

        .results-content {
            padding: 2.5rem;
        }

        .results-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .results-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1a202c;
        }

        .feedback-card {
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin: 1.5rem 0;
            text-align: center;
            border: 2px solid;
        }

        .feedback-card h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.75rem;
        }

        .feedback-card .score {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1;
        }

        .feedback-card .percentage {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin: 2rem 0;
        }

        @media(min-width: 768px) {
            .results-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .summary-card {
            background-color: white;
            padding: 1.5rem;
            border-radius: 0.75rem;
            box-shadow: var(--shadow-lg);
        }

        .summary-card h3 {
            margin-top: 0;
            font-size: 1.25rem;

        .summary-list {

        .results-actions {

        /* --- Review Screen --- */
        .review-card {

            flex-direction: column;
            height: calc(100vh - 2rem);
        }

        .review-top-bar {

            border-bottom: 1px solid #e2e8f0;

            flex: 1;
            overflow: hidden;

        .review-question-pane {

            padding: 1.5rem;
            overflow-y: auto;
        }

        .review-sidebar {

            flex-direction: column;
            overflow-y: auto;

            justify-content: space-between;
            align-items: center;
        }

        .review-q-status {

            align-items: center;

        }

        .review-q-text {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .review-option {
            border-width: 2px;

            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
        }

        .review-option.user-selected {
            box-shadow: var(--shadow-md);
        }

        .review-option.correct {
            border-color: var(--color-correct);
            background-color: var(--bg-correct);
            color: var(--color-answered);
        }

        .review-option.incorrect {
            border-color: var(--color-incorrect);
            background-color: var(--bg-incorrect);
            color: var(--color-not-answered);
        }

        .review-option.not-selected {
            background-color: #f7fafc;
            border-color: #e2e8f0;
        }

        .review-explanation {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background-color: #f0f9ff;
            border-left: 4px solid #3b82f6;
            border-radius: 0.25rem;
            animation: fadeIn 0.5s ease-in-out;
        }

        .review-explanation h4 {
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.1rem;
            color: #1e3a8a;
        }

        .review-actions {
            padding: 1.5rem 0 0 0;
            border-top: 1px solid #e2e8f0;
            margin-top: 1.5rem;
            display: flex;
            justify-content: space-between;
        }

        .review-sidebar-card {
            background: white;
            border-radius: 0.5rem;
            padding: 1rem;
            margin: 1rem;
            box-shadow: var(--shadow-sm);
        }

        .review-sidebar-card h4 {
            margin-top: 0;
            font-size: 1rem;
            text-align: center;
        }

        .toggle-switch {
            display: inline-flex;
            align-items: center;
            cursor: pointer;
        }

        .toggle-switch input {
            display: none;
        }

        .toggle-switch .slider {
            width: 44px;
            height: 24px;
            background-color: #a0aec0;
            border-radius: 9999px;
            position: relative;
            transition: background-color 0.2s;
        }

        .toggle-switch .slider::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: white;
            top: 4px;
            left: 4px;
            transition: transform 0.2s;
        }

        .toggle-switch input:checked+.slider {
            background-color: var(--color-correct);
        }

        .toggle-switch input:checked+.slider::before {
            transform: translateX(20px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Utility */
        .font-bold {
            font-weight: 700;
        }

        .font-semibold {
            font-weight: 600;
        }

        .text-center {

        }

        .mb-4 {

        }

        .mt-auto {

        }

        .svg-icon {

        /* --- Landing Page / Instructions --- */

        .profile-name {

        .landing-footer {

        /* Override for specific buttons in landing footer to match compact style */

        .landing-footer .btn-secondary {

        .page-2-footer {

        /* Instruction Text Styling */
        .instruction-group-title {
            font-weight: 700;

            font-size: 0.75rem;
            color: #000;
        }

        .instruction-section-header {

            font-size: 0.75rem;
            color: #000;
        }

        .instruction-list-ol {

        }

        .instruction-list-ol li {

        .legend-icon-box {
            width: 18px;
            height: 18px;
            display: inline-block;

        }

        .legend-icon-box.not-visited {

        }

        .legend-icon-box.not-answered {

            border-color: #dc3545;

        .legend-icon-box.answered {

        .legend-icon-circle {

            border-radius: 50%;

        .legend-icon-circle.with-tick::after {
            content: '✓';

            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

        /* Utility Override for this screen */

        /* --- Quiz Interface Redesign (Page 3) --- */

        /* Layout & Colors */
        :root {

        .option-btn {

            cursor: pointer;
            font-size: 0.85rem;
            color: #333;
            gap: 6px;

        .option-btn:hover {
            color: var(--primary-blue);
        }

        .option-btn .option-prefix {

            width: 13px;
            height: 13px;

            border-radius: 50%;

            margin-top: 4px;
            flex-shrink: 0;

        .option-btn.selected .option-prefix {

        .bg-answered {

            color: white;
            border-radius: 50% !important;
            clip-path: circle(50%);
        }

        .bg-marked {
            background: #6f42c1;
            color: white;
            border-radius: 50% !important;
            clip-path: circle(50%);
        }

        .bg-not-visited {
            background: white;
            border: 1px solid #ddd;
            color: black !important;
            border-radius: 4px !important;
        }

        .bg-marked-answered {
            background: #6f42c1;
            position: relative;
            border-radius: 50% !important;
        }

        .bg-marked-answered::after {
            content: '';
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 8px;
            height: 8px;
            background: var(--success-green);
            border-radius: 50%;
        }

        .bg-not-answered {
            background: var(--danger-red);
            color: white;
            border-radius: 50% !important;
            clip-path: url(#myClip);
            /* creating shape implies corner radius adjustments */
            border-radius: 4px 4px 12px 12px;
        }

        .palette-section-header {
            background: #007bff;
            color: white;
            padding: 4px 10px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .palette-grid {
            padding: 8px 10px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            overflow-y: auto;
            flex: 1;
            align-content: start;
        }

        .palette-item {
            width: 100%;
            aspect-ratio: 1;
            max-width: 38px;
            max-height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ccc;
            background: white;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 4px;
        }

        .palette-item.status-Answered {
            background: var(--success-green);
            color: white;
            border-color: var(--success-green);
            border-radius: 50%;
        }

        .palette-item.status-MarkedForReview {
            background: #6f42c1;
            color: white;
            border-color: #6f42c1;
            border-radius: 50%;
        }

        .palette-item.status-NotAnswered {
            background: var(--danger-red);
            color: white;
            border-color: var(--danger-red);
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        .palette-item.status-AnsweredAndMarked {
            background: #6f42c1;
            color: white;
            position: relative;
            border-radius: 50%;
        }

        .palette-item.status-AnsweredAndMarked::after {
            content: '✔';
            position: absolute;
            font-size: 8px;
            bottom: 0;
            right: 0;
            color: #28a745;
            background: white;
            border-radius: 50%;
            padding: 1px;

        .sidebar-bottom-actions {
            padding: 8px;
            background: #d4ebf7;
            border-top: 1px solid #cce0eb;
        }

        .sidebar-action-row {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
        }

        .btn-sidebar-action {
            flex: 1;
            background: #e8f0fe;
            border: 1px solid #b3d7ff;
            color: #1a73e8;
            font-size: 0.65rem;
            padding: 4px 6px;
            border-radius: 3px;
            cursor: pointer;
        }

        .btn-submit-test {
            width: 100%;
            background: #00b0ff;
            color: white;
            border: none;
            padding: 5px;
            font-weight: 600;
            font-size: 0.7rem;
            border-radius: 3px;
            cursor: pointer;
        }

        .btn-submit-test:hover {
            background: #009be0;
        }

        /* Footer Buttons */
        .quiz-footer {
            height: 40px;
            background: white;
            border-top: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            z-index: 10;
        }

        .footer-left {
            display: flex;
            gap: 12px;
        }

        .btn-footer {
            height: 28px;
            padding: 0 12px;
            border-radius: 3px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-mark-review {
            background: #4a4a4a;
            /* Dark gray */
            color: white;
            border: none;
        }

        .btn-clear {
            background: white;
            border: 1px solid #dadce0;
            color: #333;
        }

        .btn-save-next {
            background: #17a2b8;
            /* Tealish */
            color: white;
            border: none;
        }

        .sidebar-toggle {
            position: absolute;
            right: 300px;
            top: 50%;
            transform: translateY(-50%);
            background: #333;
            color: white;
            border: none;
            width: 24px;
            height: 48px;
            border-radius: 4px 0 0 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;

        /* Mobile-only elements - hidden on desktop */
        .quiz-title-mobile {
            display: none;
        }
        .btn-hamburger {
            display: none !important;
        }
        .btn-pause-mobile {
            display: none !important;
        }
        .btn-lang-mobile {
            display: none !important;

        .question-time-mobile {
            display: none !important;
        }
        .bookmark-wrapper {
            display: none !important;
        }
        .star-wrapper {
            display: none !important;

        .report-text {
            display: inline;

        /* --- Mobile Responsive for Quiz Interface --- */

                padding: 0;

                font-weight: 700;

                min-width: 28px;

                border-radius: 50%;

                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                margin-right: 10px;
                position: relative;
            }

            /* Separator after question number */
            .question-no::after {
                content: '';
                display: block;

                right: -7px;
                top: 50%;
                transform: translateY(-50%);

                height: 20px;
                background: #d1d5db;

            }

                justify-content: flex-start;

                align-items: center;
                gap: 3px;
                color: #555;
                font-size: 0.78rem;

                display: none !important;

            .view-in-wrapper {
                display: none !important;

            }

            /* Hide report text on mobile, show icon only */
            .report-text {
                display: none;

            .report-wrapper {
                margin-left: auto !important;
            }

            /* Show bookmark and star on mobile */
            .bookmark-wrapper {
                display: flex !important;

            .star-wrapper {

                width: 100% !important;
                max-width: 100%;

                border-radius: 12px !important;
                background: white !important;
                align-items: center;

            .option-btn:hover {

            .option-btn.selected {

                background: #f0f4ff !important;

            .option-btn .option-prefix {
                min-width: auto;
                width: auto;
                height: auto;

                border-radius: 0;

                font-weight: 500;

                padding: 0 16px;
                font-size: 0.82rem;

                font-weight: 600;

                border: 1.5px solid #d1d5db;
            }

            .btn-clear {
                background: white;
                color: #333;
                border: 1.5px solid #d1d5db;
            }

            .btn-save-next {
                min-width: 110px;
                font-size: 0.85rem;
                font-weight: 700;
                height: 38px;
                border-radius: 8px;
                background: #3b82f6;
                color: white;
                border: none;

                padding: 14px 14px 0;

                gap: 10px;

                padding: 14px 16px;

            }

            }

            }

                width: 75vw;
            }

            .quiz-sidebar.sidebar-open ~ .sidebar-toggle {

            }

        /* Ensure question HTML content renders well */
        .question-text img {
            max-width: 100%;
            height: auto;
        }

        .question-text table {

            padding: 4px 8px;
            border: 1px solid #ddd;
        }

        .option-btn img {
            max-width: 100%;
            height: auto;
        }
    </style>

SSC_GD_Full_Test_01,"<b>Comprehension:</b><br/>Read the passage and answer the questions.<br/><br/>Spiders inhabit every continent except Antarctica and play dual roles as predators and prey. They employ varied hunting tactics — spinning intricate webs to ensnare victims or ambushing them from concealment. Except for the herbivorous Bagheera kiplingi, these eight-legged carnivores subsist mainly on insects, though some consume lizards, birds, frogs, fish, or even snakes. Certain species prey on other spiders, while female widow spiders notoriously devour their mates. Spiders themselves fall victim to lizards, birds, scorpions, and even parasitic wasps that entomb them alive. In parts of the South Pacific and Southeast Asia, they are considered edible delicacies. Most spiders possess venom designed to immobilise prey, not humans. Only about 25 known species produce venom harmful to humans, and fatalities are exceedingly rare. The feared Sydney funnel-web spider has caused no deaths since the 1981 anti-venom. Hairy spiders such as tarantulas defend themselves by releasing urticating hairs that irritate skin and eyes. Spiders create multiple kinds of silk — some adhesive for trapping, others remarkably strong. Orb-weaver silk rivals steel in tensile strength, and scientists have replicated it synthetically for applications from artificial tissue to resilient sportswear. Despite their adaptability, spiders generally remain near their habitats; only 'ballooning spiders' travel long distances. Ironically, although many fear them, less than 2% of species are harmful to humans.<br/><br/><b> SubQuestion No : 7</b><br/>Which title best encapsulates the passage?",Deadly Predators of the Insect World,Webs of Death and Silk of Steel,Spiders: Fearsome Yet Fascinating Creatures,Arachnophobia: A Human Weakness,3,,,,

SSC_GD_Full_Test_04,"<b>Comprehension:</b><br/>Read the given passage carefully and answer the questions that follow.<br/><br/>The Peloponnesian War, chronicled by the ancient historian Thucydides, was sparked by the rise of Athens and the fear this instilled in the established power, Sparta. This dynamic—when a rising power threatens to displace a ruling power—has been termed the 'Thucydides's Trap' by political scientist Graham Allison. The central argument is that such structural shifts in the balance of power create a high risk of conflict, not necessarily because of deliberate aggression, but often through a combination of fear, misunderstanding, and the friction of third-party events. The ruling power, fearing the loss of its privileged position, may resort to preemptive action, while the rising power, emboldened by its new strength, may become more assertive in claiming what it perceives as its rightful place. Allison's research points to a sobering historical precedent: in 12 of 16 cases over the last 500 years where a major nation rose to challenge an established one, the result was war. However, the trap is not an iron law of history. Whether the trap is 'sprung' depends heavily on the choices, strategies, and diplomatic skill of the leaders involved. The concept serves not as a prediction of inevitable conflict, but as a potent analytical lens and a stark warning for contemporary statecraft in an era of great power transition.<br/><br/>Which of the following is the most suitable title for the passage?",The Economics of Modern China,A Biography of Graham Allison,The Complete History of Ancient Greece,The Thucydides's Trap: The Inevitability of Hegemonic War?,4,,,,

    <script>
        // Fix mobile viewport height (address bar issue)
        function setVh() {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', vh + 'px');
        }
        setVh();
        window.addEventListener('resize', setVh);

        document.addEventListener('DOMContentLoaded', () => {
            const S = {
                // State
                appPhase: 'instructions',
                questions: [],
                userAnswers: [],
                currentQuestionIndex: 0,
                timeLeft: 0,
                timerInterval: null,
                isTimerPaused: false,
                autoNext: false,
                isFullScreen: false,
                isSidebarCollapsed: true,
                quizResults: null,
                reviewIndex: 0
            };

            const C = JSON.parse(document.getElementById('quiz-data').textContent);

            // --- CSV PARSER ---
            function parseCSV(text) {
                const rows = [];
                let current = [];
                let field = '';
                let inQuotes = false;

                for (let i = 0; i < text.length; i++) {
                    const ch = text[i];
                    if (inQuotes) {
                        if (ch === '"' && text[i + 1] === '"') {
                            field += '"';
                            i++;
                        } else if (ch === '"') {
                            inQuotes = false;
                        } else {
                            field += ch;
                        }
                    } else {
                        if (ch === '"') {
                            inQuotes = true;
                        } else if (ch === ',') {
                            current.push(field);
                            field = '';
                        } else if (ch === '\n' || (ch === '\r' && text[i + 1] === '\n')) {
                            if (ch === '\r') i++;
                            current.push(field);
                            field = '';
                            if (current.length > 1 || current[0].trim() !== '') rows.push(current);
                            current = [];
                        } else {
                            field += ch;
                        }
                    }
                }
                current.push(field);
                if (current.length > 1 || current[0].trim() !== '') rows.push(current);
                return rows;
            }

            function decodeHTMLEntities(str) {
                const el = document.createElement('textarea');
                el.innerHTML = str;
                return el.value;
            }

            function cleanOptionText(text) {
                let t = text.trim();
                // Decode HTML entities like &amp;nbsp; -> &nbsp; -> space, &amp;#39; -> &#39; -> '
                t = decodeHTMLEntities(decodeHTMLEntities(t));
                // Remove leading number prefix like "1)", "2) ", etc.
                t = t.replace(/^\d+\)\s*/, '');
                // Trim trailing/leading whitespace and non-breaking spaces
                t = t.replace(/[\u00A0]+$/g, '').trim();
                // Sanitize math-tex spans that don't contain real LaTeX
                t = sanitizeMathTex(t);
                return t;
            }

            // Unwrap math-tex spans that contain only simple text (no real LaTeX commands)
            function sanitizeMathTex(html) {
                // Match <span class="math-tex">\( content \)</span>
                return html.replace(/<span\s+class=["']math-tex["']>\s*\\\(\s*(.*?)\s*\\\)\s*<\/span>/gi, function(match, inner) {
                    // If inner has actual LaTeX commands (\sqrt, \frac, ^, _, \text, \times, etc.), keep it
                    if (/\\[a-zA-Z]+|[\^_{}]/.test(inner)) {
                        return match; // Keep for MathJax
                    }
                    // Otherwise it's just plain text wrapped in math-tex unnecessarily
                    return inner.trim();
                });
            }

            function cleanQuestionText(text) {
                let t = text.trim();
                t = decodeHTMLEntities(decodeHTMLEntities(t));
                // Preserve HTML for rendering (tables, math, bold, images)
                // Just collapse excessive whitespace around tags
                t = t.replace(/(\r?\n\s*){3,}/g, '\n\n');
                // Sanitize math-tex spans that don't contain real LaTeX
                t = sanitizeMathTex(t);
                return t.trim();
            }

            function parseCorrectAnswer(str) {
                const s = str.trim();
                // Handle plain number like "1", "2", "3", "4"
                if (/^\d+$/.test(s)) return parseInt(s, 10) - 1;
                // Handle "The correct answer is option X"
                const match = s.match(/option\s*(\d+)/i);
                return match ? parseInt(match[1], 10) - 1 : 0;
            }

            // --- MULTI-TEST SUPPORT ---
            function slugify(str) {
                return str.trim().toLowerCase()
                    .replace(/[^a-z0-9\s-]/g, '')
                    .replace(/[\s_]+/g, '-')
                    .replace(/-+/g, '-')
                    .replace(/^-|-$/g, '');
            }

            function getUrlParams() {
                return new URLSearchParams(window.location.search);
            }

            // Parse all CSV rows (full master CSV with test_id in column A)
            let allCsvRows = [];

            async function loadFullCSV() {
                let text;
                try {
                    const resp = await fetch('Questions.csv');
                    if (resp.ok) text = await resp.text();
                } catch(e) {}
                if (!text) text = document.getElementById('csv-data').textContent;
                const rows = parseCSV(text);
                // Skip header row, keep all data rows
                allCsvRows = rows.slice(1).filter(row => row[0] && row[0].trim() !== '' && row.length >= 6);
                return allCsvRows;
            }

            function getAvailableTests(rows) {
                const testMap = new Map();
                rows.forEach(row => {
                    const testId = row[0].trim();
                    if (!testId) return;
                    if (!testMap.has(testId)) testMap.set(testId, 0);
                    testMap.set(testId, testMap.get(testId) + 1);
                });
                return testMap; // Map<testName, questionCount>
            }

            function loadQuestionsForTest(testSlug) {
                const matchingRows = allCsvRows.filter(row => {
                    return slugify(row[0].trim()) === testSlug;
                });

                if (matchingRows.length === 0) return null;

                // The test_id (column A) becomes the quiz title
                C.quizTitle = matchingRows[0][0].trim();
                document.title = `${C.appName || 'Testbook'} | ${C.quizTitle}`;

                C.questions = matchingRows.map((row, index) => {
                    const statement = cleanQuestionText(row[1] || '');
                    const options = [
                        cleanOptionText(row[2] || ''),
                        cleanOptionText(row[3] || ''),
                        cleanOptionText(row[4] || ''),
                        cleanOptionText(row[5] || '')
                    ];
                    const correctIndex = parseCorrectAnswer(row[6] || '');

                    return {
                        id: index,
                        text: statement,
                        options: options,
                        correctIndex: correctIndex,
                        explanation: (row[6] || '').trim(),
                        reference: ''
                    };
                });

                // Apply URL param overrides or use defaults
                const params = getUrlParams();
                if (params.get('pos')) C.positiveMarking = parseFloat(params.get('pos'));
                if (params.get('neg')) C.negativeMarking = parseFloat(params.get('neg'));
                if (!C.positiveMarking) C.positiveMarking = 1;
                if (C.negativeMarking === undefined) C.negativeMarking = 0;

                // Time: URL param (minutes) > timePerQuestion config > 2 min/question
                const qCount = C.questions.length;
                const timePerQ = C.timePerQuestion || 2; // minutes per question
                if (params.get('time')) {
                    C.totalTime = parseInt(params.get('time')) * 60;
                } else {
                    C.totalTime = qCount * timePerQ * 60;
                }

                const totalMinutes = Math.floor(C.totalTime / 60);
                const maxMarks = qCount * C.positiveMarking;
                C.instructionStrings.instruction1 = `The quiz contains ${qCount} questions.`;
                C.instructionStrings.totalTime = `Time: ${totalMinutes} minutes`;
                C.instructionStrings.totalMarks = `Total Marks: ${maxMarks}`;
                C.instructionStrings.instruction3 = `You will have ${totalMinutes} minutes to complete the quiz.`;
                if (C.negativeMarking > 0) {
                    C.instructionStrings.instruction4 = `Negative marking applies: ${C.negativeMarking} marks will be deducted for each incorrect answer.`;
                } else {
                    C.instructionStrings.instruction4 = 'There is no negative marking.';
                }
                C.instructionStrings.instruction5 = `${C.positiveMarking} mark(s) will be awarded for each correct answer.`;

                return C.questions;
            }

            // Legacy: load questions without test_id column (backward compat)
            async function loadQuestionsFromCSV() {
                try {
                    let text;
                    try {
                        const resp = await fetch('Questions.csv');
                        if (resp.ok) text = await resp.text();
                    } catch(e) {}
                    if (!text) text = document.getElementById('csv-data').textContent;
                    const rows = parseCSV(text);

                    // Skip header row
                    const dataRows = rows.slice(1);

                    C.questions = dataRows.filter(row => {
                        // Skip rows where statement is empty or all fields empty
                        return row[0] && row[0].trim() !== '' && row.length >= 5;
                    }).map((row, index) => {
                        const statement = cleanQuestionText(row[0] || '');
                        const options = [
                            cleanOptionText(row[1] || ''),
                            cleanOptionText(row[2] || ''),
                            cleanOptionText(row[3] || ''),
                            cleanOptionText(row[4] || '')
                        ];
                        const correctIndex = parseCorrectAnswer(row[5] || '');

                        return {
                            id: index,
                            text: statement,
                            options: options,
                            correctIndex: correctIndex,
                            explanation: (row[5] || '').trim(),
                            reference: ''
                        };
                    });

                    // Update dynamic config based on loaded question count
                    const qCount = C.questions.length;
                    if (!C.positiveMarking) C.positiveMarking = 1;
                    if (C.negativeMarking === undefined) C.negativeMarking = 0;
                    if (!C.totalTime) C.totalTime = qCount * 120;
                    const totalMinutes = Math.floor(C.totalTime / 60);
                    const maxMarks = qCount * C.positiveMarking;
                    C.instructionStrings.instruction1 = `The quiz contains ${qCount} questions.`;
                    C.instructionStrings.totalTime = `Time: ${totalMinutes} minutes`;
                    C.instructionStrings.totalMarks = `Total Marks: ${maxMarks}`;
                    C.instructionStrings.instruction3 = `You will have ${totalMinutes} minutes to complete the quiz.`;

                } catch (err) {
                    console.error('Failed to load Questions.csv:', err);
                    alert('Could not load questions from CSV. Please ensure Questions.csv is available.');
                }
            }

            C.QuestionStatus = {
                NotVisited: 'notVisited', NotAnswered: 'notAnswered', Answered: 'answered', MarkedForReview: 'markedForReview', AnsweredAndMarked: 'answeredAndMarked'
            }

                ;

            const root = document.querySelector('.app-container');

            // --- TEMPLATE RENDERERS ---
            const render = (template, target) => {
                target.innerHTML = template;
            }

                ;

            const instructionsTemplate = () => {
                return `
                <div class="landing-container">
                    <div class="landing-header">
                        <img src="testbook_logo.png" alt="Testbook" class="testbook-logo">
                        <span class="landing-title">${C.quizTitle}</span>
                    </div>
                    <div class="landing-body">
                        <div class="instructions-area">
                            <div class="instruction-group-title">General Instructions:</div>
                            <ol class="instruction-list-ol">
                                <li>The clock will be set at the server. The countdown timer at the top right corner of screen will display the remaining time available for you to complete the examination. When the timer reaches zero, the examination will end by itself. You need not terminate the examination or submit your paper.</li>
                                <li>The Question Palette displayed on the right side of screen will show the status of each question using one of the following symbols:

            // --- TEST PICKER TEMPLATE ---
            const testPickerTemplate = (testMap) => {
                let testCards = '';
                testMap.forEach((count, testName) => {
                    const testSlug = slugify(testName);
                    testCards += `
                        <a href="?test=${encodeURIComponent(testSlug)}" class="test-picker-card">

                return `
