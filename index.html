<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Testbook | 01 Oct Trail Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(','\\)'], ['$', '$']],
        processEscapes: true
      },
      svg: {
        fontCache: 'global'
      }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary-color: #4361ee;
            --primary-dark: #3a56d4;
            --color-correct: #28a745;
            --color-incorrect: #dc3545;
            --color-unattempted: #ffc107;
            --color-marked: #805ad5;
            --color-not-answered: #c53030;
            --color-answered: #2f855a;
            --color-answered-marked: #2c5282;

            --bg-correct: #f0fff4;
            --bg-incorrect: #fff5f5;
            --bg-unattempted: #fffff0;
            --bg-marked: #faf5ff;
            --bg-not-answered: #fed7d7;
            --bg-answered: #c6f6d5;
            --bg-answered-marked: #bee3f8;
            --bg-not-visited: #edf2f7;

            --border-correct: #9ae6b4;
            --border-incorrect: #feb2b2;
            --border-unattempted: #fefcbf;
            --border-marked: #e9d8fd;
            --border-not-answered: #f56565;
            --border-answered: #68d391;
            --border-answered-marked: #90cdf4;
            --border-not-visited: #e2e8f0;

            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);

            --sidebar-width: 320px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: white;
            color: #2d3748;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Hidden SVG Sprite */
        .svg-sprite {
            display: none;
        }

        .hidden {
            display: none !important;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .card {
            background-color: white;
            border-radius: 1rem;
            box-shadow: var(--shadow-xl);
            overflow: hidden;
            width: 100%;
        }

        /* --- Instructions Screen --- */
        .instructions-card {
            max-width: 800px;
        }

        .instructions-content {
            padding: 2rem;
        }

        .instructions-content h1 {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            color: #1a202c;
            margin-bottom: 1.5rem;
        }

        .instructions-summary {
            background-color: #edf2f7;
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            margin-bottom: 1.5rem;
        }

        .instructions-list {
            list-style: none;
            padding-left: 0;
            margin-bottom: 1.5rem;
        }

        .instructions-list li {
            padding-left: 1.5rem;
            position: relative;
            margin-bottom: 0.5rem;
        }

        .instructions-list li::before {
            content: '✔';
            position: absolute;
            left: 0;
            color: var(--primary-color);
        }

        .instructions-actions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        @media(min-width: 640px) {
            .instructions-actions {
                flex-direction: row;
                justify-content: space-between;
            }
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: #e2e8f0;
            color: #4a5568;
        }

        .btn-secondary:hover {
            background-color: #cbd5e0;
        }

        /* --- Quiz Screen --- */
        .quiz-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            max-height: 100vh;
            max-width: 1600px;
        }

        .quiz-container.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            border-radius: 0;
        }

        /* --- Quiz Screen Redesign --- */
        .quiz-top-bar {
            background-color: white;
            color: #333;
            padding: 0 1rem;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
            z-index: 10;
        }

        .quiz-header-logo {
            height: 24px;
        }

        .top-bar-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .timer-display {
            background-color: #f8f9fa;
            border: 1px solid #e0e0e0;
            padding: 4px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.875rem;
            font-weight: 600;
            color: #333;
            font-family: monospace;
        }

        .timer-box {
            background: #333;
            color: white;
            padding: 0 4px;
            border-radius: 2px;
            margin: 0 1px;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-top-control {
            background: white;
            border: 1px solid #007bff;
            color: #007bff;
            padding: 4px 12px;
            font-size: 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-top-control:hover {
            background: #f0f7ff;
        }

        /* Section Bar */
        .section-bar {
            background-color: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 0 1rem;
            height: 40px;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-shrink: 0;
        }

        .section-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
        }

        .section-tab {
            background-color: #0d4e6d;
            /* Dark teal/blue from image */
            color: white;
            padding: 4px 16px;
            border-radius: 4px 4px 0 0;
            /* Tab shape */
            font-size: 0.875rem;
            cursor: pointer;
            height: 100%;
            display: flex;
            align-items: center;
            margin-top: 4px;
            /* Push down to sit on line */
        }

        .quiz-main-area {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
            position: relative;
        }

        .question-pane {
            flex-grow: 1;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .question-header {
            background-color: white;
            padding: 0;
            border-bottom: 1px solid #eee;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .question-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .question-no {
            font-weight: 700;
            font-size: 1rem;
        }

        .question-info-right {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.75rem;
            color: #666;
        }

        .marking-scheme {
            display: flex;
            gap: 4px;
        }

        .badge-success {
            background: #28a745;
            color: white;
            padding: 0 4px;
            border-radius: 2px;
        }

        .badge-danger {
            background: #dc3545;
            color: white;
            padding: 0 4px;
            border-radius: 2px;
        }

        .view-in-select {
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            padding: 2px 4px;
            font-size: 0.75rem;
        }

        .question-text {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            white-space: pre-line;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option-btn {
            text-align: left;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            background-color: white;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: flex-start;
        }

        .option-btn:hover {
            border-color: var(--primary-color);
            background-color: #f7fafc;
        }

        .option-btn.selected {
            background-color: transparent;
            color: #333;
            border-color: transparent;
            font-weight: 400;
        }

        .option-btn.correct {
            background-color: var(--bg-correct);
            border-color: var(--border-correct);
            color: var(--color-answered);
        }

        .option-btn.incorrect {
            background-color: var(--bg-incorrect);
            border-color: var(--border-incorrect);
            color: var(--color-not-answered);
        }

        .option-btn .option-prefix {
            font-weight: 600;
            margin-right: 0.5rem;
            color: var(--primary-color);
        }

        .option-btn.selected .option-prefix {
            color: var(--primary-color);
        }

        .question-actions {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }

        @media(min-width: 640px) {
            .question-actions {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Sidebar Redesign */
        .quiz-sidebar {
            width: 300px;
            background: #eef4fa;
            border-left: 1px solid #d0d0d0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s ease;
            z-index: 20;
            overflow: hidden;
            padding: 0;
        }

        .sidebar-user-info {
            background: #dbeafe;
            padding: 0.5rem 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 1px solid #cbd5e0;
            flex-shrink: 0;
        }

        .sidebar-legend {
            background: white;
            padding: 0.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            font-size: 0.7px;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: #444;
        }

        .bg-answered {
            background-color: #28a745;
            clip-path: polygon(0% 0%, 75% 0%, 100% 50%, 75% 100%, 0% 100%);
            border-radius: 4px;
            width: 18px;
            height: 16px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .bg-marked {
            background-color: #805ad5;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .bg-not-visited {
            background-color: #fff;
            border: 1px solid #ccc;
            color: #333;
            border-radius: 4px;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .bg-marked-answered {
            background-color: #805ad5;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            position: relative;
        }

        .bg-marked-answered::after {
            content: '✓';
            position: absolute;
            bottom: -4px;
            right: -4px;
            background: #28a745;
            border-radius: 50%;
            width: 10px;
            height: 10px;
            font-size: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .bg-not-answered {
            background-color: #dc3545;
            clip-path: polygon(0% 0%, 75% 0%, 100% 50%, 75% 100%, 0% 100%);
            border-radius: 4px;
            width: 18px;
            height: 16px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .palette-section-header {
            background: #4a90e2;
            /* Blue header for section */
            color: white;
            padding: 4px 8px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .palette-grid {
            padding: 0.5rem;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            overflow-y: auto;
            flex: 1;
            align-content: start;
            background: #eef4fa;
        }

        .palette-grid .palette-item {
            width: 100%;
            height: 28px;
            border: 1px solid #ccc;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 2px;
            margin: 0;
            color: #333;
        }

        .palette-grid .palette-item:hover {
            background: #f0f0f0;
        }

        .palette-grid .palette-item.current {
            border: 2px solid #333;
        }

        .palette-grid .palette-item.status-answered {
            background-color: #28a745;
            color: white;
            clip-path: polygon(0% 0%, 80% 0%, 100% 50%, 80% 100%, 0% 100%);
            border: none;
        }

        .palette-grid .palette-item.status-notAnswered {
            background-color: #dc3545;
            color: white;
            clip-path: polygon(0% 0%, 80% 0%, 100% 50%, 80% 100%, 0% 100%);
            border: none;
        }

        .palette-grid .palette-item.status-markedForReview {
            background-color: #805ad5;
            color: white;
            border-radius: 50%;
            border: none;
        }

        .palette-grid .palette-item.status-answeredAndMarked {
            background-color: #805ad5;
            color: white;
            border-radius: 50%;
            border: none;
            position: relative;
        }

        .palette-grid .palette-item.status-answeredAndMarked::after {
            content: '✓';
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: #28a745;
            border-radius: 50%;
            width: 8px;
            height: 8px;
            font-size: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-bottom-actions {
            background: #dbeafe;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            border-top: 1px solid #d0d0d0;
            flex-shrink: 0;
        }

        .sidebar-action-row {
            display: flex;
            gap: 0.5rem;
        }

        .btn-sidebar-action {
            flex: 1;
            background: #cbd5e0;
            border: 1px solid #a0aec0;
            color: #2d3748;
            padding: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 2px;
            font-weight: 500;
        }

        .btn-submit-test {
            width: 100%;
            background: #00a9e0;
            color: white;
            border: none;
            padding: 8px;
            font-weight: 600;
            border-radius: 2px;
            cursor: pointer;
        }

        .quiz-sidebar.collapsed {
            transform: translateX(100%);
            width: 0;
            padding: 0;
            border-left: none;
            overflow: hidden;
        }

        .sidebar-toggle {
            position: absolute;
            top: 50%;
            right: 300px;
            transform: translateY(-50%);
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px 0 0 4px;
            padding: 0.75rem 0.25rem;
            cursor: pointer;
            z-index: 25;
            transition: right 0.3s ease;
        }

        .quiz-sidebar.collapsed+.sidebar-toggle {
            right: 0;
        }

        .sidebar-toggle svg {
            width: 1.25rem;
            height: 1.25rem;
        }

        .palette-header {
            text-align: center;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .question-palette {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .palette-item {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.25rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .palette-item.current {
            border-color: var(--primary-dark);
            transform: scale(1.1);
            box-shadow: var(--shadow-md);
        }

        .palette-item.correct {
            background-color: var(--bg-answered);
            border: 1px solid var(--border-answered);
            color: var(--color-answered);
        }

        .palette-item.incorrect {
            background-color: var(--bg-incorrect);
            border: 1px solid var(--border-incorrect);
            color: var(--color-incorrect);
        }

        .palette-item.unattempted {
            background-color: #f7fafc;
            border: 1px solid #e2e8f0;
            color: #4a5568;
        }


        /* Palette Status Colors */
        .status-notVisited {
            background-color: var(--bg-not-visited);
            border-color: var(--border-not-visited);
            color: #4a5568;
        }

        .status-notAnswered {
            background-color: var(--bg-not-answered);
            border-color: var(--border-not-answered);
            color: var(--color-not-answered);
        }

        .status-answered {
            background-color: var(--bg-answered);
            border-color: var(--border-answered);
            color: var(--color-answered);
        }

        .status-markedForReview {
            background-color: var(--bg-marked);
            border-color: var(--border-marked);
            color: var(--color-marked);
            position: relative;
        }

        .status-answeredAndMarked {
            background-color: var(--bg-answered-marked);
            border-color: var(--border-answered-marked);
            color: var(--color-answered-marked);
            position: relative;
        }

        .status-markedForReview::after,
        .status-answeredAndMarked::after {
            content: '';
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            background-color: var(--color-marked);
            border-radius: 50%;
        }

        /* --- Results Screen --- */
        .results-card {
            max-width: 1000px;
            background-color: #f7fafc;
        }

        .results-content {
            padding: 2.5rem;
        }

        .results-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .results-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1a202c;
        }

        .feedback-card {
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin: 1.5rem 0;
            text-align: center;
            border: 2px solid;
        }

        .feedback-card h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.75rem;
        }

        .feedback-card .score {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1;
        }

        .feedback-card .percentage {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin: 2rem 0;
        }

        @media(min-width: 768px) {
            .results-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .summary-card {
            background-color: white;
            padding: 1.5rem;
            border-radius: 0.75rem;
            box-shadow: var(--shadow-lg);
        }

        .summary-card h3 {
            margin-top: 0;
            font-size: 1.25rem;
            color: #2d3748;
        }

        .summary-list {
            list-style: none;
            padding: 0;
        }

        .summary-list li {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #edf2f7;
        }

        .summary-list li:last-child {
            border-bottom: none;
        }

        .css-bar {
            background-color: #e2e8f0;
            border-radius: 99px;
            height: 12px;
            overflow: hidden;
        }

        .css-bar-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 0.8s ease-out;
        }

        .results-actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .social-card {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            text-align: center;
        }

        .social-card .btn {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid white;
        }

        .social-card .btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        /* --- Review Screen --- */
        .review-card {
            max-width: 1400px;
            display: flex;

            padding: 0.75rem 1rem;
        }

        }

        .review-option.correct {
            border-color: var(--color-correct);
            background-color: var(--bg-correct);
            color: var(--color-answered);
        }

        .review-option.incorrect {
            border-color: var(--color-incorrect);
            background-color: var(--bg-incorrect);
            color: var(--color-not-answered);
        }

        .review-option.not-selected {
            background-color: #f7fafc;
            border-color: #e2e8f0;
        }

        .review-explanation {
            margin-top: 1.5rem;

            border-left: 4px solid #3b82f6;
            border-radius: 0.25rem;
            animation: fadeIn 0.5s ease-in-out;
        }

        .review-explanation h4 {
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.1rem;
            color: #1e3a8a;
        }

        .review-actions {
            padding: 1.5rem 0 0 0;
            border-top: 1px solid #e2e8f0;
            margin-top: 1.5rem;
            display: flex;
            justify-content: space-between;
        }

            font-size: 1rem;

        .toggle-switch {
            display: inline-flex;
            align-items: center;
            cursor: pointer;
        }

        .toggle-switch input {
            display: none;
        }

        .toggle-switch .slider {
            width: 44px;
            height: 24px;
            background-color: #a0aec0;
            border-radius: 9999px;
            position: relative;
            transition: background-color 0.2s;
        }

        .toggle-switch .slider::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: white;
            top: 4px;
            left: 4px;
            transition: transform 0.2s;
        }

        .toggle-switch input:checked+.slider {
            background-color: var(--color-correct);
        }

        .toggle-switch input:checked+.slider::before {
            transform: translateX(20px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- Quiz Interface Redesign (Page 3) --- */

    <script>document.addEventListener('DOMContentLoaded', () => {
            const S = {

            // --- CSV PARSER ---
            function parseCSV(text) {
                const rows = [];
                let current = [];
                let field = '';
                let inQuotes = false;

                for (let i = 0; i < text.length; i++) {
                    const ch = text[i];
                    if (inQuotes) {
                        if (ch === '"' && text[i + 1] === '"') {
                            field += '"';
                            i++;
                        } else if (ch === '"') {
                            inQuotes = false;
                        } else {
                            field += ch;
                        }
                    } else {
                        if (ch === '"') {
                            inQuotes = true;
                        } else if (ch === ',') {
                            current.push(field);
                            field = '';
                        } else if (ch === '\n' || (ch === '\r' && text[i + 1] === '\n')) {
                            if (ch === '\r') i++;
                            current.push(field);
                            field = '';
                            if (current.length > 1 || current[0].trim() !== '') rows.push(current);
                            current = [];
                        } else {
                            field += ch;
                        }
                    }
                }
                current.push(field);
                if (current.length > 1 || current[0].trim() !== '') rows.push(current);
                return rows;
            }

            function decodeHTMLEntities(str) {
                const el = document.createElement('textarea');
                el.innerHTML = str;
                return el.value;
            }

            function cleanOptionText(text) {
                let t = text.trim();
                // Decode HTML entities like &amp;nbsp; -> &nbsp; -> space, &amp;#39; -> &#39; -> '
                t = decodeHTMLEntities(decodeHTMLEntities(t));
                // Remove leading number prefix like "1)", "2) ", etc.
                t = t.replace(/^\d+\)\s*/, '');
                // Trim trailing/leading whitespace and non-breaking spaces
                t = t.replace(/[\u00A0]+$/g, '').trim();
                return t;
            }

            function cleanQuestionText(text) {
                let t = text.trim();
                t = decodeHTMLEntities(decodeHTMLEntities(t));
                // Preserve HTML for rendering (tables, math, bold, images)
                // Just collapse excessive whitespace around tags
                t = t.replace(/(\r?\n\s*){3,}/g, '\n\n');
                return t.trim();
            }

            function parseCorrectAnswer(str) {
                const s = str.trim();
                // Handle plain number like "1", "2", "3", "4"
                if (/^\d+$/.test(s)) return parseInt(s, 10) - 1;
                // Handle "The correct answer is option X"
                const match = s.match(/option\s*(\d+)/i);
                return match ? parseInt(match[1], 10) - 1 : 0;
            }

            async function loadQuestionsFromCSV() {
                try {
                    let text;
                    try {
                        const resp = await fetch('Questions.csv');
                        if (resp.ok) text = await resp.text();
                    } catch(e) {}
                    if (!text) text = document.getElementById('csv-data').textContent;
                    const rows = parseCSV(text);

                    // Skip header row
                    const dataRows = rows.slice(1);

                    C.questions = dataRows.filter(row => {
                        // Skip rows where statement is empty or all fields empty
                        return row[0] && row[0].trim() !== '' && row.length >= 5;
                    }).map((row, index) => {
                        const statement = cleanQuestionText(row[0] || '');
                        const options = [
                            cleanOptionText(row[1] || ''),
                            cleanOptionText(row[2] || ''),
                            cleanOptionText(row[3] || ''),
                            cleanOptionText(row[4] || '')
                        ];
                        const correctIndex = parseCorrectAnswer(row[5] || '');

                        return {
                            id: index,
                            text: statement,
                            options: options,
                            correctIndex: correctIndex,
                            explanation: (row[5] || '').trim(),
                            reference: ''
                        };
                    });

                    // Update dynamic config based on loaded question count
                    const qCount = C.questions.length;
                    C.totalTime = qCount * 120; // 2 minutes per question
                    C.instructionStrings.instruction1 = `The quiz contains ${qCount} questions.`;
                    C.instructionStrings.totalTime = `Time: ${Math.floor(C.totalTime / 60)} minutes`;

            async function init() {

            function showScreen(screenName) {
                document.querySelectorAll('.card').forEach(s => s.classList.add('hidden'));
                const screenEl = document.getElementById(screenName + 'Screen');

                if (screenName === 'instructions') render(instructionsTemplate(), screenEl);
                if (screenName === 'secondInstructions') render(secondInstructionsTemplate(), screenEl);
                if (screenName === 'quiz') render(quizTemplate(), screenEl);
                if (screenName === 'results') render(resultsTemplate(), screenEl);
                if (screenName === 'review') render(reviewTemplate(), screenEl);

                screenEl.classList.remove('hidden');
                S.appPhase = screenName;
                addEventListeners(); // Re-add listeners for new DOM

                if (screenName === 'quiz') postQuizRender();
                if (screenName === 'results') postResultsRender();
                if (screenName === 'review') postReviewRender();
            }

            // --- SCREEN-SPECIFIC LOGIC & LISTENERS ---
            function addEventListeners() {
                if (S.appPhase === 'instructions') {
                    const proceed = document.getElementById('proceedButton');
                    if (proceed) proceed.onclick = () => showScreen('secondInstructions');
                    const backLink = document.getElementById('goBackLink');

                    if (previousBtn) previousBtn.onclick = () => showScreen('instructions');

                    const beginBtn = document.getElementById('beginTestButton');
                    if (beginBtn) {
                        beginBtn.onclick = () => {
                            const checkbox = document.getElementById('declarationCheckbox');
                            if (!checkbox.checked) {
                                alert('Please accept the declaration to continue');
                                return;
                            }
                            startQuiz();
                        };
                    }
                }

                else if (S.appPhase === 'quiz') {
                    document.getElementById('pauseTimerBtn').onclick = toggleTimerPause;
                    document.getElementById('fullscreenBtn').onclick = toggleFullScreen;
                    document.getElementById('markReviewBtn').onclick = handleMarkForReview;
                    document.getElementById('clearResponseBtn').onclick = handleClearResponse;
                    document.getElementById('saveNextBtn').onclick = handleSaveAndNext;
                    document.getElementById('submitQuizBtn').onclick = submitQuiz;
                    document.getElementById('sidebarToggle').onclick = toggleSidebar;
                }

                else if (S.appPhase === 'results') {
                    document.getElementById('reviewAnswersBtn').onclick = startReview;
                    document.getElementById('reattemptQuizBtn').onclick = startQuiz;

                else if (S.appPhase === 'review') {

            function startQuiz() {
                S.currentQuestionIndex = 0;
                S.timeLeft = C.totalTime;

                S.questionTimes = S.questions.map(() => 0);
                S.userAnswers = S.questions.map(q => ({
                    questionId: q.id, selectedOptionIndex: null, status: C.QuestionStatus.NotVisited, isMarked: false,
                }));
                S.userAnswers[0].status = C.QuestionStatus.NotAnswered;
                showScreen('quiz');

                // Try to enter fullscreen
                document.documentElement.requestFullscreen().catch(err => {
                    console.warn('Could not automatically enter fullscreen: ' + err.message);
                });
            }

            function postQuizRender() {
                updateTimerDisplay();
                renderQuestion();
                renderPalette();
                updateQuestionTimerDisplay();
                if (!S.timerInterval) startTimer();
            }

            function renderQuestion() {
                const q = S.questions[S.currentQuestionIndex];
                if (!q) return;

                const qNumEl = document.getElementById('questionNumber');
                if (qNumEl) qNumEl.textContent = `Question No. ${S.currentQuestionIndex + 1}`;

                const badgeSuccess = document.querySelector('.badge-success');
                const badgeDanger = document.querySelector('.badge-danger');
                if (badgeSuccess) badgeSuccess.textContent = "+1.0";
                if (badgeDanger) badgeDanger.textContent = "-" + (C.negativeMarking ? C.negativeMarking.toFixed(2) : "0.00");

                const qTextEl = document.getElementById('questionText');
                if (qTextEl) qTextEl.innerHTML = q.text;

                const opts = document.getElementById('optionsContainer');
                if (opts) {
                    opts.innerHTML = '';
                    const answer = S.userAnswers[S.currentQuestionIndex];

                    q.options.forEach((opt, i) => {
                        const btn = document.createElement('button');
                        btn.className = 'option-btn';
                        if (answer.selectedOptionIndex === i) btn.classList.add('selected');

                        btn.innerHTML = `<span class="option-prefix"></span><span>${opt}</span>`;
                        btn.onclick = () => selectOption(i);
                        opts.appendChild(btn);
                    });
                }

                const saveBtn = document.getElementById('saveNextBtn');
                if (saveBtn) saveBtn.textContent = (S.currentQuestionIndex === S.questions.length - 1) ? 'Save & Finish' : 'Save & Next';
                updateQuestionTimerDisplay();

                // Re-typeset MathJax for dynamically loaded content
                if (window.MathJax && MathJax.typesetPromise) {
                    MathJax.typesetPromise().catch(function (err) {
                        console.warn('MathJax typeset error:', err);
                    });
                }
            }
            function renderPalette() {
                const p = document.getElementById('questionPalette');
                p.innerHTML = '';

                S.userAnswers.forEach((ans, i) => {
                    const item = document.createElement('div');
                    item.className = `palette-item status-${ans.status}`;
                    if (i === S.currentQuestionIndex) item.classList.add('current');
                    item.textContent = i + 1;
                    item.onclick = () => navigateToQuestion(i);
                    p.appendChild(item);
                });

                // Update legend counts
                const counts = { answered: 0, markedForReview: 0, notVisited: 0, answeredAndMarked: 0, notAnswered: 0 };
                S.userAnswers.forEach(a => { if (counts[a.status] !== undefined) counts[a.status]++; });
                const legendItems = document.querySelectorAll('.sidebar-legend .legend-item');
                if (legendItems.length >= 5) {
                    legendItems[0].querySelector('div').textContent = counts.answered;
                    legendItems[1].querySelector('div').textContent = counts.markedForReview;
                    legendItems[2].querySelector('div').textContent = counts.notVisited;
                    legendItems[3].querySelector('div').textContent = counts.answeredAndMarked;
                    legendItems[4].querySelector('div').textContent = counts.notAnswered;
                }
            }

            function selectOption(index) {
                const answer = S.userAnswers[S.currentQuestionIndex];
                answer.selectedOptionIndex = index;
                answer.status = answer.isMarked ? C.QuestionStatus.AnsweredAndMarked : C.QuestionStatus.Answered;
                renderQuestion(); renderPalette();

                if (S.autoNext && S.currentQuestionIndex < S.questions.length - 1) {
                    setTimeout(() => navigateToQuestion(S.currentQuestionIndex + 1), 300);
                }
            }

            function updateQuestionTimerDisplay() {
                const el = document.getElementById('questionTimer');
                if (!el || !S.questionTimes) return;
                const t = S.questionTimes[S.currentQuestionIndex] || 0;
                const m = Math.floor(t / 60).toString().padStart(2, '0');
                const s = (t % 60).toString().padStart(2, '0');
                el.textContent = m + ':' + s;
            }

            function navigateToQuestion(index) {
                if (index === S.currentQuestionIndex) return;
                S.currentQuestionIndex = index;
                const answer = S.userAnswers[index];
                if (answer.status === C.QuestionStatus.NotVisited) answer.status = C.QuestionStatus.NotAnswered;
                renderQuestion(); renderPalette();
            }

            function handleSaveAndNext() {
                if (S.currentQuestionIndex < S.questions.length - 1) navigateToQuestion(S.currentQuestionIndex + 1);
                else submitQuiz();
            }

            function handleMarkForReview() {
                const answer = S.userAnswers[S.currentQuestionIndex];
                answer.isMarked = !answer.isMarked;
                answer.status = answer.selectedOptionIndex !== null ? (answer.isMarked ? C.QuestionStatus.AnsweredAndMarked : C.QuestionStatus.Answered) : (answer.isMarked ? C.QuestionStatus.MarkedForReview : C.QuestionStatus.NotAnswered);
                handleSaveAndNext();
            }

            function handleClearResponse() {
                const answer = S.userAnswers[S.currentQuestionIndex];
                answer.selectedOptionIndex = null;
                answer.status = answer.isMarked ? C.QuestionStatus.MarkedForReview : C.QuestionStatus.NotAnswered;
                renderQuestion(); renderPalette();
            }

            function submitQuiz() {
                if (confirm('Are you sure you want to submit the test?')) {
                    stopTimer();
                    calculateResults();
                    showScreen('results');
                }
            }

            // --- TIMER ---
            function startTimer() {
                stopTimer(); S.timerInterval = setInterval(tick, 1000);
            }

            function stopTimer() {
                clearInterval(S.timerInterval); S.timerInterval = null;
            }

            function tick() {
                if (S.isTimerPaused) return;
                S.timeLeft--;
                if (S.questionTimes) S.questionTimes[S.currentQuestionIndex]++;
                updateTimerDisplay();
                updateQuestionTimerDisplay();

                if (S.timeLeft <= 0) {
                    alert('Time is up!'); submitQuiz();
                }
            }

            function updateTimerDisplay() {
                const totalSeconds = S.timeLeft;
                const hours = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
                const mins = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
                const secs = (totalSeconds % 60).toString().padStart(2, '0');

                const hourEl = document.getElementById('timer-hour');
                const minEl = document.getElementById('timer-min');
                const secEl = document.getElementById('timer-sec');

                if (hourEl) hourEl.textContent = hours;
                if (minEl) minEl.textContent = mins;
                if (secEl) secEl.textContent = secs;
            }
            function toggleTimerPause() {
                S.isTimerPaused = !S.isTimerPaused;
                const btn = document.getElementById('pauseTimerBtn');
                if (btn) btn.textContent = S.isTimerPaused ? 'Resume' : 'Pause';
            }

            // --- RESULTS ---
            function calculateResults() {
                let correct = 0, incorrect = 0, unattempted = 0, score = 0, negativeMarksApplied = 0;

                S.userAnswers.forEach((ua, i) => {
                    const q = S.questions[i];
                    if (ua.selectedOptionIndex === null) unattempted++;

                    else if (ua.selectedOptionIndex === q.correctIndex) {
                        correct++; score++;
                    }

                    else {
                        incorrect++; score -= C.negativeMarking; negativeMarksApplied += C.negativeMarking;
                    }
                });
                score = Math.max(0, score);
                const total = S.questions.length;
                const percentage = total > 0 ? (score / total) * 100 : 0;

                S.quizResults = {
                    correct, incorrect, unattempted, score: score.toFixed(2), percentage: percentage.toFixed(1), totalQuestions: total, negativeMarksApplied
                }

                    ;
            }

            function getMotivationalFeedback(percentage) {
                if (percentage >= 85) return {
                    title: "Outstanding!", message: "Future Officer, you have a strong grasp of the material.", color: 'var(--color-correct)', bgColor: 'var(--bg-correct)'
                }

                    ;

                if (percentage >= 70) return {
                    title: "Great Job!", message: "You're on the right track. Review your mistakes!", color: '#4361ee', bgColor: '#e0e7ff'
                }

                    ;

                if (percentage >= 50) return {
                    title: "Solid Effort!", message: "There's room for improvement. Keep practicing!", color: 'var(--color-unattempted)', bgColor: 'var(--bg-unattempted)'
                }

                    ;

                return {
                    title: "Keep Going!", message: "Don't be discouraged! This is a learning opportunity.", color: 'var(--color-incorrect)', bgColor: 'var(--bg-incorrect)'
                }

                    ;
            }

            function postResultsRender() {
                const chartContainer = document.getElementById('chart-container');
                chartContainer.innerHTML = '';

                const data = [
                    { label: 'Correct', value: S.quizResults.correct, color: 'var(--color-correct)' },
                    { label: 'Incorrect', value: S.quizResults.incorrect, color: 'var(--color-incorrect)' },
                    { label: 'Unattempted', value: S.quizResults.unattempted, color: 'var(--color-unattempted)' }
                ];

                data.forEach(item => {
                    const barWrapper = document.createElement('div');
                    barWrapper.style.marginBottom = '1rem';
                    const percent = (item.value / S.quizResults.totalQuestions) * 100;

                    barWrapper.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.25rem;">
                            <span class="font-semibold text-sm" style="color: ${item.color};">${item.label}</span>
                            <span class="text-sm font-medium">${item.value} / ${S.quizResults.totalQuestions}</span>
                        </div>
                        <div class="css-bar">
                            <div class="css-bar-fill" style="width: 0%; background: ${item.color};" data-percent="${percent}"></div>
                        </div>`;
                    chartContainer.appendChild(barWrapper);
                });

                // Animate bars
                setTimeout(() => {
                    document.querySelectorAll('.css-bar-fill').forEach(bar => {
                        bar.style.width = bar.getAttribute('data-percent') + '%';
                    });
                }, 100);
            }

            // --- REVIEW ---
            function startReview() {
                S.reviewIndex = 0; showScreen('review');
            }

            function postReviewRender() {
                renderReviewQuestion();
                renderReviewPalette();
            }

            function renderReviewQuestion() {
                const q = S.questions[S.reviewIndex];
                const ua = S.userAnswers[S.reviewIndex];

                const statusInfo = ua.selectedOptionIndex === null
                    ? { text: 'Unattempted', color: 'var(--color-unattempted)', icon: 'minus-circle' }
                    : ua.selectedOptionIndex === q.correctIndex
                        ? { text: 'Correct', color: 'var(--color-correct)', icon: 'check-circle' }
                        : { text: 'Incorrect', color: 'var(--color-incorrect)', icon: 'x-circle' };

                document.getElementById('reviewQuestionNumber').textContent = `Question ${S.reviewIndex + 1} of ${S.questions.length}`;
                const statusEl = document.getElementById('reviewQuestionStatus');
                statusEl.innerHTML = `<svg class="svg-icon" style="width:1.25rem;height:1.25rem; margin-right: 0.5rem;"><use href="#icon-${statusInfo.icon}"></use></svg> ${statusInfo.text}`;
                statusEl.style.color = statusInfo.color;

                document.getElementById('reviewQuestionText').innerHTML = q.text;
                const opts = document.getElementById('reviewOptionsContainer');
                opts.innerHTML = '';

                q.options.forEach((opt, i) => {
                    const div = document.createElement('div');
                    div.className = 'option-btn review-option';

                    const isCorrect = i === q.correctIndex;
                    const isUserSelected = i === ua.selectedOptionIndex;

                    if (isCorrect) div.classList.add('correct');
                    else if (isUserSelected) div.classList.add('incorrect');
                    else div.classList.add('not-selected');

                    if (isUserSelected) div.classList.add('user-selected');

                    let iconHtml = '';
                    if (isCorrect) iconHtml = `<svg class="svg-icon" style="width:1.5rem;height:1.5rem;color:var(--color-correct);"><use href="#icon-check-circle"></use></svg>`;
                    if (isUserSelected && !isCorrect) iconHtml = `<svg class="svg-icon" style="width:1.5rem;height:1.5rem;color:var(--color-incorrect);"><use href="#icon-x-circle"></use></svg>`;

                    div.innerHTML = `<div><span class="option-prefix">${String.fromCharCode(65 + i)}.</span><span>${opt}</span></div> ${iconHtml}`;
                    opts.appendChild(div);
                });
                document.getElementById('explanationText').innerHTML = q.explanation || '';
                document.getElementById('prevReviewBtn').disabled = S.reviewIndex === 0;
                document.getElementById('nextReviewBtn').disabled = S.reviewIndex === S.questions.length - 1;

                // Update sidebar stats
                document.getElementById('review-sidebar-stats').innerHTML = `<ul class="summary-list text-sm"><li><span>Status:</span> <span class="font-semibold" style="color: ${statusInfo.color};">${statusInfo.text}</span></li></ul>`;

                // Re-typeset MathJax for review content
                if (window.MathJax && MathJax.typesetPromise) {
                    MathJax.typesetPromise().catch(function (err) {
                        console.warn('MathJax typeset error:', err);
                    });
                }
            }

            function renderReviewPalette() {
                const palette = document.getElementById('review-palette');
                palette.innerHTML = '';

                S.questions.forEach((q, i) => {
                    const ua = S.userAnswers[i];
                    const item = document.createElement('div');
                    item.className = 'palette-item';

                    if (ua.selectedOptionIndex === null) item.classList.add('unattempted');
                    else if (ua.selectedOptionIndex === q.correctIndex) item.classList.add('correct');
                    else item.classList.add('incorrect');

                    if (i === S.reviewIndex) item.classList.add('current');

                    item.textContent = i + 1;

                    item.onclick = () => {
                        S.reviewIndex = i;
                        renderReviewQuestion();
                        renderReviewPalette(); // To update the 'current' item
                        document.getElementById('reviewExplanation').classList.add('hidden');
                        document.getElementById('toggleExplanationBtn').textContent = 'Show Solution';
                    }

                        ;
                    palette.appendChild(item);
                });
            }


            function navigateReview(dir) {
                const newIndex = S.reviewIndex + dir;

                if (newIndex >= 0 && newIndex < S.questions.length) {
                    S.reviewIndex = newIndex;
                    renderReviewQuestion();
                    renderReviewPalette();
                    document.getElementById('reviewExplanation').classList.add('hidden');
                    document.getElementById('toggleExplanationBtn').textContent = 'Show Solution';
                }
            }

            function toggleExplanation() {
                const exp = document.getElementById('reviewExplanation');
                const btn = document.getElementById('toggleExplanationBtn');
                const isHidden = exp.classList.toggle('hidden');
                btn.textContent = isHidden ? 'Show Solution' : 'Hide Solution';
            }

            // --- HELPERS ---
            function toggleFullScreen() {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(err => console.error(err));
                else if (document.exitFullscreen) document.exitFullscreen();
            }

            document.addEventListener('fullscreenchange', () => {
                S.isFullScreen = !!document.fullscreenElement;
                const qc = document.querySelector('.quiz-container');
                if (qc) qc.classList.toggle('fullscreen', S.isFullScreen);
                const btn = document.getElementById('fullscreenBtn');
                if (btn) btn.textContent = S.isFullScreen ? 'Exit Full Screen' : 'Switch Full Screen';
            });

            function toggleSidebar() {
                const sb = document.getElementById('quizSidebar');
                const sbt = document.getElementById('sidebarToggle');

                if (window.innerWidth <= 768) {
                    // Mobile: toggle sidebar-open class and backdrop
                    sb.classList.toggle('sidebar-open');
                    const isOpen = sb.classList.contains('sidebar-open');
                    let backdrop = document.getElementById('sidebarBackdrop');
                    if (!backdrop) {
                        backdrop = document.createElement('div');
                        backdrop.id = 'sidebarBackdrop';
                        backdrop.className = 'sidebar-backdrop';
                        backdrop.onclick = toggleSidebar;
                        sb.parentElement.insertBefore(backdrop, sb);
                    }
                    backdrop.classList.toggle('active', isOpen);
                    sbt.innerHTML = isOpen
                        ? `<svg class="svg-icon"><use href="#icon-chevron-right"></use></svg>`
                        : `<svg class="svg-icon"><use href="#icon-chevron-left"></use></svg>`;
                } else {
                    // Desktop: toggle collapsed class
                    S.isSidebarCollapsed = !S.isSidebarCollapsed;
                    sb.classList.toggle('collapsed', S.isSidebarCollapsed);
                    sbt.innerHTML = S.isSidebarCollapsed
                        ? `<svg class="svg-icon"><use href="#icon-chevron-left"></use></svg>`
                        : `<svg class="svg-icon"><use href="#icon-chevron-right"></use></svg>`;
                }
            }

            init();
        });
    </script>
