name: Sync LMS Questions

on:
  workflow_dispatch:

jobs:
  sync_and_deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: sync-lms-group
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: python -m pip install requests python-dotenv

      - name: Run Fetch Script
        env:
          LMS_EMAIL: ${{ secrets.LMS_EMAIL }}
          LMS_PASSWORD: ${{ secrets.LMS_PASSWORD }}
          CI: true
        run: python run.py

      - name: Commit and Push Changes
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated Sync from Google Sheet"
          file_pattern: 'Questions.csv index.html data/ .qid_cache.json'

      - name: Force push to trigger Vercel (if no data changed)
        if: steps.commit.outputs.changes_detected == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: trigger Vercel redeploy [skip ci]"
          git push
